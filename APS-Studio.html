<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS Studio — Orale</title>
<style>
:root{
  --bg:#f4f6f9; --bg2:#ffffff; --bg3:#eceff3; --card:#ffffff; --card2:#f5f7fa;
  --txt:#1a2330; --soft:#54616e; --soft2:#8693a0; --line:#e2e7ee;
  --acc:#0969da; --acch:#0a5fc2; --acc2:#7c3aed; --ok:#1a7f37; --bad:#cf222e; --warn:#9a6700;
  --tag:#e6f0fb; --tagtx:#0a4f8a; --code:#9a4b00; --on-acc:#ffffff; --hi:#0b1320;
  --shadow:0 4px 18px rgba(30,50,80,.08);
}
html.dark{
  --bg:#0f1216; --bg2:#161b22; --bg3:#1c232c; --card:#1a2129; --card2:#212a34;
  --txt:#e6edf3; --soft:#9aa7b4; --soft2:#6e7d8c; --line:#2a333d;
  --acc:#5eb1ff; --acch:#7ec0ff; --acc2:#7c5cff; --ok:#3fb950; --bad:#f85149; --warn:#d29922;
  --tag:#243240; --tagtx:#79c0ff; --code:#ffd9a0; --on-acc:#06121f; --hi:#ffffff;
  --shadow:0 6px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;font-size:16px}
a{color:var(--acc);text-decoration:none}
code{background:var(--bg3);padding:.1em .4em;border-radius:5px;font-size:.85em;color:var(--code);font-family:"Cascadia Code",Consolas,monospace}
pre{background:#0c0f13;border:1px solid var(--line);border-radius:9px;padding:12px 14px;overflow-x:auto;margin:10px 0;font-size:.82rem}
pre code{background:none;color:#cfe3ff;padding:0}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#33404d;border-radius:6px}::-webkit-scrollbar-track{background:var(--bg)}

.layout{display:flex;min-height:100vh}
aside{width:270px;background:var(--bg2);border-right:1px solid var(--line);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:20;transition:transform .25s}
aside .brand{padding:18px 18px 12px;border-bottom:1px solid var(--line);position:relative}
.themetgl{position:absolute;top:15px;right:14px;background:var(--bg3);border:1px solid var(--line);color:var(--txt);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1rem;line-height:1;transition:.15s}
.themetgl:hover{border-color:var(--acc)}
aside .brand h1{font-size:1.15rem;letter-spacing:.3px}
aside .brand p{font-size:.71rem;color:var(--soft2);margin-top:3px}
nav.toc{padding:8px 10px 40px}
nav.toc .grp{font-size:.66rem;text-transform:uppercase;letter-spacing:1px;color:var(--soft2);padding:13px 12px 4px}
nav.toc button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--soft);padding:9px 12px;border-radius:9px;cursor:pointer;font-size:.91rem;transition:.15s}
nav.toc button:hover{background:var(--bg3);color:var(--txt)}
nav.toc button.active{background:linear-gradient(90deg,rgba(94,177,255,.16),transparent);color:var(--acc);font-weight:600}
nav.toc button .ic{width:20px;text-align:center;font-size:1rem}
main{flex:1;margin-left:270px;padding:34px 40px 90px;max-width:1100px}
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:30;width:46px;height:46px;border-radius:12px;background:var(--acc);color:var(--on-acc);border:none;font-size:1.4rem;cursor:pointer;box-shadow:var(--shadow)}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:18}
section.view{display:none;animation:fade .3s}
section.view.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.vh{font-size:1.75rem;margin-bottom:4px;display:flex;align-items:center;gap:11px}
.lead{color:var(--soft);margin-bottom:22px;font-size:.96rem}

.tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:18px;box-shadow:var(--shadow)}
.tcard h3{font-size:1.22rem;color:var(--hi);margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;scroll-margin-top:20px}
.tcard h4{font-size:1.02rem;color:var(--acc);margin:16px 0 5px}
.tcard p{margin:8px 0}
.tcard ul,.tcard ol{margin:8px 0 8px 22px}
.tcard li{margin:4px 0}
.tcard strong{color:var(--hi)}
.src{font-size:.65rem;background:var(--tag);color:var(--tagtx);padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px;white-space:nowrap;border:1px solid var(--line)}
.src.blue{background:#e3f0fb;color:#0a4f8a;border-color:#bcdcf5}
.src.sofia{background:#efe7fb;color:#5b3aa6;border-color:#d8c8f2}
.src.app{background:#e3f5e9;color:#1a7f37;border-color:#bfe6cd}
html.dark .src{border-color:#2f4255}
html.dark .src.blue{background:#142a3f;color:#79c0ff;border-color:#1f4a6e}
html.dark .src.sofia{background:#2a1f3f;color:#c9a9ff;border-color:#46326e}
html.dark .src.app{background:#1f2f25;color:#7ee2a0;border-color:#2f5a40}
.note{background:linear-gradient(90deg,rgba(210,153,34,.12),transparent);border-left:3px solid var(--warn);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:.92rem}
.def{background:rgba(94,177,255,.08);border:1px solid #284a66;border-radius:10px;padding:12px 16px;margin:12px 0}
.def b{color:var(--acc)}
.jumprow{margin:14px 0 2px;display:flex;flex-wrap:wrap}
.jump{display:inline-flex;gap:6px;align-items:center;background:var(--bg3);border:1px solid var(--line);color:var(--acc);padding:5px 11px;border-radius:8px;font-size:.8rem;cursor:pointer;margin:4px 6px 4px 0;transition:.15s}
.jump:hover{background:var(--acc);color:var(--on-acc);border-color:var(--acc)}
table.gt{width:100%;border-collapse:collapse;margin:12px 0;font-size:.87rem}
table.gt th,table.gt td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
table.gt th{background:var(--bg3);color:var(--acc)}
table.gt tr:nth-child(even){background:rgba(255,255,255,.02)}
.toc-mini{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 22px}
.toc-mini a{background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:20px;font-size:.83rem;color:var(--soft);cursor:pointer}
.toc-mini a:hover{color:var(--acc);border-color:var(--acc)}

.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.btn{background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:9px 15px;border-radius:9px;cursor:pointer;font-size:.9rem;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.primary{background:var(--acc);color:var(--on-acc);border-color:var(--acc);font-weight:600}
.btn.primary:hover{background:var(--acch)}
.btn.ok{border-color:var(--ok);color:var(--ok)}.btn.ok:hover{background:var(--ok);color:var(--on-acc)}
.btn.bad{border-color:var(--bad);color:var(--bad)}.btn.bad:hover{background:var(--bad);color:#fff}
.btn.sm{padding:6px 11px;font-size:.82rem}
select.sel{background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:.9rem;cursor:pointer}
.flashwrap{perspective:1600px;margin:10px auto;max-width:700px}
.flash{position:relative;width:100%;min-height:330px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s}
.flash.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 30px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);overflow:auto}
.face .lbl{position:absolute;top:14px;left:18px;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--soft2)}
.face .topic{position:absolute;top:11px;right:16px;font-size:.68rem;color:var(--acc);background:var(--bg3);padding:3px 9px;border-radius:14px}
.face .ct{font-size:1.18rem;text-align:center;font-weight:600}
.back{transform:rotateY(180deg)}
.back .ct{font-size:1rem;text-align:left;line-height:1.65;font-weight:400}
.back .ct ul{margin:8px 0 0 20px}
.face .src{position:absolute;bottom:11px;right:16px}
.hint{text-align:center;color:var(--soft2);font-size:.8rem;margin-top:8px}
.fbar{display:flex;justify-content:space-between;align-items:center;max-width:700px;margin:14px auto 0;gap:10px}
.prog{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;flex:1;margin:0 4px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));width:0;transition:.3s}
.cardstat{font-size:.85rem;color:var(--soft)}
.statkn{color:var(--ok)}.statrv{color:var(--warn)}

.quizq{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.quizq .qtop{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;align-items:flex-start}
.quizq .qn{font-size:.77rem;color:var(--soft2)}
.quizq .qtext{font-size:1.05rem;font-weight:600;margin-bottom:12px;color:var(--hi)}
.opt{display:block;width:100%;text-align:left;background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:.94rem;transition:.12s}
.opt:hover:not(:disabled){border-color:var(--acc)}
.opt:disabled{cursor:default}
.opt.correct{background:rgba(63,185,80,.16);border-color:var(--ok);color:#7ee2a0}
.opt.wrong{background:rgba(248,81,73,.14);border-color:var(--bad);color:#ff9d97}
.opt.dim{opacity:.5}
.expl{margin-top:10px;padding:11px 14px;border-radius:9px;background:rgba(94,177,255,.08);border-left:3px solid var(--acc);font-size:.9rem;display:none}
.expl.show{display:block}
.scorebar{position:sticky;top:0;z-index:5;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 18px;margin-bottom:18px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow)}
.scorebar .big{font-size:1.25rem;font-weight:700}
.pill{background:var(--bg3);padding:4px 11px;border-radius:14px;font-size:.82rem;color:var(--soft)}
.summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center;margin-bottom:18px}
.summary .pct{font-size:3rem;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

.mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.mcard .ac{font-size:1.45rem;font-weight:800;letter-spacing:1px;color:var(--acc2);margin-bottom:6px}
.mcard .sub{font-size:.85rem;color:var(--soft);margin-bottom:8px}
.mcard ul{margin:6px 0 0 4px;list-style:none}
.mcard li{margin:5px 0;font-size:.93rem}
.mcard li b{color:var(--acc2);display:inline-block;min-width:1.5em}

.gofgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.gofgrid button{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px;cursor:pointer;color:var(--txt);transition:.15s;text-align:center}
.gofgrid button:hover{border-color:var(--acc);transform:translateY(-2px)}
.gofgrid button .gn{font-weight:700;display:block}
.gofgrid button .gc{font-size:.71rem;color:var(--soft2);margin-top:4px;display:block}
.gofcat{font-size:.64rem;padding:2px 8px;border-radius:12px;font-weight:600}
.cat-cre{background:#1f2f25;color:#7ee2a0}.cat-str{background:#142a3f;color:#79c0ff}.cat-com{background:#2a1f3f;color:#c9a9ff}
.gofdetail{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.gofdetail h3{font-size:1.4rem;display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:10px}
.svgwrap{background:#0c0f13;border:1px solid var(--line);border-radius:12px;padding:16px;margin:14px 0;overflow-x:auto}
.svgwrap svg{display:block;margin:0 auto;max-width:100%;height:auto}
.steps{counter-reset:s;list-style:none;margin:10px 0!important}
.steps li{counter-increment:s;position:relative;padding-left:36px;margin:9px 0}
.steps li::before{content:counter(s);position:absolute;left:0;top:0;width:25px;height:25px;background:var(--acc2);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700}
.partlist{display:grid;gap:8px;margin:10px 0}
.part{background:var(--bg3);border-radius:9px;padding:9px 13px;font-size:.9rem}
.part b{color:var(--acc)}

.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
.pbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center}
.pbox .num{font-size:2.1rem;font-weight:800;color:var(--acc)}
.pbox .lab{font-size:.82rem;color:var(--soft);margin-top:3px}
.barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:.85rem}
.barrow .bn{width:200px;color:var(--soft);flex-shrink:0}
.barrow .bt{flex:1;height:14px;background:var(--bg3);border-radius:7px;overflow:hidden}
.barrow .bt>i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#6fe39a)}
.barrow .bv{width:52px;text-align:right;color:var(--soft)}

.intsetup{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin:12px 0}
.chip{background:var(--bg3);border:1px solid var(--line);color:var(--soft);padding:7px 13px;border-radius:20px;cursor:pointer;font-size:.85rem;user-select:none;transition:.12s}
.chip.on{background:var(--acc);color:var(--on-acc);border-color:var(--acc);font-weight:600}
.qbig{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:16px;box-shadow:var(--shadow)}
.qbig .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.qbig .qq{font-size:1.3rem;font-weight:600;color:var(--hi);line-height:1.45}
.qbig .model{margin-top:16px;padding:16px;background:rgba(94,177,255,.07);border:1px dashed #2f4f6e;border-radius:10px;display:none}
.qbig .model.show{display:block}
.qbig .model h5{color:var(--acc);font-size:.78rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.qbig .model ul{margin:6px 0 0 20px}
.homecard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;cursor:pointer;transition:.15s;display:flex;gap:14px;align-items:flex-start}
.homecard:hover{border-color:var(--acc);transform:translateY(-2px)}
.homecard .hi{font-size:1.7rem}
.homecard h3{font-size:1.08rem;color:var(--hi)}
.homecard p{font-size:.88rem;color:var(--soft);margin-top:2px}
.homegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.footnote{color:var(--soft2);font-size:.78rem;margin-top:30px;border-top:1px solid var(--line);padding-top:14px}

@media(max-width:880px){
  aside{transform:translateX(-100%)}
  aside.open{transform:none}
  main{margin-left:0;padding:64px 16px 80px}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  aside.open ~ .scrim{display:block}
  h2.vh{font-size:1.4rem}
  .barrow .bn{width:120px}
}
</style>

"use strict";
/* ===========================================================================
   APS STUDIO — strumento di studio per l'orale di APS.

   Appunti (Theofilia Jessica) · Blue3141 · Sofia.  Vedi APS_indice_fonti.md.

const SRC={app:'<span class="src app">Appunti</span>',blue:'<span class="src blue">Blue3141</span>',sofia:'<span class="src sofia">Sofia</span>'};
function srcTags(s){return s.split(',').map(x=>SRC[x.trim()]||'').join(' ');}

<!-- ============================ DATA: TEORIA ============================ -->
<script>
window.APS={};
APS.theory=[
{id:"intro",icon:"🧭",title:"1 · Introduzione: software, ingegneria, UML",blocks:[
 {h:"Il software e le sue caratteristiche",src:"app,blue,sofia",html:`<p>Il <strong>software</strong> è un programma per computer con la relativa documentazione (specifica dei requisiti, modelli di progetto, manuale utente). Un prodotto software può essere:</p>
 <ul><li><strong>Generico</strong>: sviluppato per un ampio insieme di clienti; le specifiche sono proprietà dello sviluppatore.</li>
 <li><strong>Personalizzato (custom)</strong>: sviluppato per un singolo cliente; le specifiche sono proprietà del cliente.</li></ul>
 <p>Nuovo software si può creare da zero, sfruttando software esistente, o personalizzando programmi preesistenti.</p>
 <p>Le <strong>caratteristiche di un buon software</strong> sono quattro:</p>
 <ul><li><strong>Mantenibilità</strong>: comprensibile e modificabile da futuri collaboratori.</li>
 <li><strong>Affidabilità / Fidatezza</strong>: robusto, sicuro, sempre disponibile.</li>
 <li><strong>Efficienza</strong>: non spreca risorse, reagisce prontamente, usa bene CPU e RAM.</li>
 <li><strong>Accettabilità</strong>: compatibile e usabile, accettato e compreso dagli utenti.</li></ul>`},
 {h:"Tipi di applicazione",src:"sofia",html:`<p>Sofia elenca i tipi di applicazione: <strong>stand-alone</strong> (eseguite su computer locale, senza rete), <strong>interattive basate su transazioni</strong> (remote, es. e-commerce), <strong>embedded</strong> (controllo di dispositivi hardware), <strong>di elaborazione batch</strong> (grandi quantità di dati senza interazione utente), <strong>di intrattenimento</strong>, <strong>di modellazione e simulazione</strong>, <strong>di raccolta dati</strong> (sensori), <strong>sistemi di sistemi</strong> (composti da altri sistemi software).</p>`},
 {h:"Ingegneria del software",src:"app,blue,sofia",html:`<div class="def"><b>Definizione.</b> L'ingegneria del software è una <b>disciplina ingegneristica</b> che si occupa di tutti gli aspetti della produzione di software di buona qualità, dalle prime specifiche fino alla manutenzione dopo la messa in uso.</div>
 <ul><li>È una disciplina ingegneristica: usa teorie e metodi specifici, tenendo conto dei vincoli organizzativi e finanziari.</li>
 <li>Copre <strong>tutti</strong> gli aspetti: non solo il processo tecnico di sviluppo, ma anche la gestione del progetto e lo sviluppo di strumenti/metodi di supporto.</li></ul>
 <p>I costi del software dominano i costi dei sistemi informatici; la <strong>manutenzione costa più dello sviluppo</strong>. Cause di fallimento: crescente complessità del sistema e mancato utilizzo dei metodi di ingegneria del software. <span class="src sofia">Sofia</span></p>`},
 {h:"Attività fondamentali di processo",src:"app,blue,sofia",html:`<p>Comuni a (quasi) tutti i processi software:</p>
 <ol><li><strong>Requisiti / Analisi dei requisiti</strong>: definire i servizi che il software deve offrire.</li>
 <li><strong>Analisi</strong> e <strong>Progettazione</strong>: capire il problema e organizzare la soluzione.</li>
 <li><strong>Implementazione</strong>: tradurre il progetto in codice.</li>
 <li><strong>Validazione</strong>: verificare che il sistema soddisfi le richieste del cliente.</li>
 <li><strong>Rilascio e installazione</strong>, <strong>Manutenzione ed evoluzione</strong>, <strong>Gestione del progetto</strong>.</li></ol>
 <div class="note">Nel corso ci si concentra su <strong>Analisi</strong> = "fare la cosa giusta" (capire il problema e i requisiti) e <strong>Progettazione</strong> = "fare la cosa bene" (soluzione concettuale che soddisfa i requisiti). Sono attività distinte ma sinergiche e <em>non sequenziali</em>.</div>
 <p><strong>Analisi OO</strong>: identifica i <em>concetti/oggetti del mondo reale</em> (classi concettuali). <strong>Progettazione OO</strong>: definisce <em>oggetti software</em> che collaborano per soddisfare i requisiti.</p>`},
 {h:"Le quattro fasi di Analisi e Progettazione",src:"app",html:`<ol><li><strong>Casi d'uso</strong>: descrizioni narrative di come il sistema verrà usato.</li>
 <li><strong>Modello di dominio</strong>: concetti/oggetti chiave del dominio e loro relazioni.</li>
 <li><strong>Diagrammi di interazione</strong>: visione dinamica, come gli oggetti software collaborano.</li>
 <li><strong>Diagrammi delle classi</strong>: visione statica delle classi software (attributi e metodi).</li></ol>`},
 {h:"Che cos'è UML",src:"app,blue,sofia",html:`<p>L'<strong>Unified Modeling Language</strong> è un <strong>linguaggio visuale di modellazione</strong> per sistemi software (e non solo): una raccolta di best practice ingegneristiche, standard <em>de facto</em>. <strong>UML non è una metodologia</strong> (UP sì lo è). Modella i sistemi come insiemi di oggetti che collaborano:</p>
 <ul><li><strong>Struttura statica</strong>: quali oggetti servono e come sono correlati.</li>
 <li><strong>Struttura dinamica</strong>: ciclo di vita degli oggetti e come collaborano.</li></ul>
 <p>Tre <strong>livelli di dettaglio</strong>: come <strong>abbozzo</strong> (diagrammi informali, incompleti — preferito dalla modellazione agile), come <strong>progetto</strong> (dettagliati), come <strong>linguaggio di programmazione</strong> (specifica eseguibile).</p>
 <p>Due <strong>punti di vista</strong> (stessa notazione): <strong>concettuale</strong> (oggetti del mondo reale → Modello di Dominio, classi concettuali) e <strong>software</strong> (componenti software → Modello di Progetto, classi software).</p>`}
]},
{id:"processi",icon:"🔁",title:"2 · Processi software, UP, Agile, Scrum",blocks:[
 {h:"Processo software",src:"app,blue,sofia",html:`<div class="def"><b>Processo software.</b> Approccio disciplinato per costruzione, rilascio e manutenzione del software. Definisce <b>chi</b> (ruoli) fa <b>cosa</b> (attività), <b>quando</b> (organizzazione temporale) e <b>come</b> (metodologie). La sua descrizione comprende artefatti, ruoli, pre/post-condizioni.</div>
 <p>Due famiglie: <strong>basati sul piano</strong> (tutto pianificato in anticipo, progressi misurati sul piano) e <strong>agili</strong> (pianificazione incrementale, abbracciano il cambiamento). In pratica la maggior parte combina i due. Modelli di processo: <strong>a cascata</strong>, <strong>sviluppo incrementale</strong>, <strong>integrazione e configurazione</strong> (riuso).</p>
 <p>Esistono diversi modelli per: complessità del progetto, dimensione del team, budget/tempistiche, rischio. <span class="src sofia">Sofia</span></p>`},
 {h:"Processo a cascata (waterfall)",src:"app,blue,sofia",html:`<p>Esecuzione <strong>sequenziale</strong> di fasi distinte: definizione requisiti → progettazione sistema/sw → implementazione e test unità → integrazione e test di sistema → messa in uso e manutenzione. In linea di principio una fase si completa prima della successiva.</p>
 <p>Fallisce spesso perché <strong>inflessibile</strong> rispetto alle mutevoli esigenze del cliente: adatto solo quando i requisiti sono ben definiti e stabili. Studi: ~25% cambi di requisiti (medi), fino al 35% (grandi). <span class="src sofia">Sofia</span></p>`},
 {h:"Sviluppo iterativo, incrementale ed evolutivo",src:"app,blue,sofia",html:`<p>Non è un processo specifico ma un modello di organizzazione. Lo sviluppo è in <strong>iterazioni timeboxed</strong> (durata fissa, ~2-6 settimane), ciascuna un mini-progetto con tutte le attività che produce un <strong>sistema eseguibile, testato e integrato</strong> (anche parziale).</p>
 <ul><li><strong>Incrementale</strong>: il sistema cresce iterazione dopo iterazione.</li>
 <li><strong>Evolutivo</strong>: feedback dell'iterazione N → raffinamento di requisiti e progetto in N+1.</li></ul>
 <p><strong>Vantaggi</strong>: minor probabilità di fallimento, riduzione precoce dei rischi, progresso visibile, feedback precoce e coinvolgimento utente, gestione della complessità.</p>
 <p><strong>Timeboxing</strong>: la durata dell'iterazione è fissa; si adatta il <em>carico di lavoro</em>, non il tempo. Pianificazione guidata dal <strong>rischio</strong> e dal <strong>cliente</strong>. Durante un'iterazione i requisiti sono <strong>fissati e bloccati</strong>. <span class="src blue">Blue</span> <span class="src sofia">Sofia</span></p>`},
 {h:"Unified Process (UP)",src:"app,blue,sofia",html:`<p>Processo iterativo, incrementale ed evolutivo diffuso per lo sviluppo OO. <strong>Flessibile e aperto</strong> (quasi tutto opzionale tranne il codice), prende elementi da XP e Scrum. È <strong>pilotato dai casi d'uso</strong> (requisiti) e dai <strong>rischi</strong>, <strong>incentrato sull'architettura</strong>.</p>
 <h4>Le 4 fasi (organizzano le iterazioni)</h4>
 <ol><li><strong>Ideazione</strong>: avvio, visione approssimativa, studio economico, stime grossolane (una sola iterazione).</li>
 <li><strong>Elaborazione</strong>: realizzazione del nucleo dell'architettura, risoluzione rischi maggiori, definizione della maggior parte dei requisiti.</li>
 <li><strong>Costruzione</strong>: implementazione iterativa degli elementi rimanenti (più facili) e preparazione al rilascio.</li>
 <li><strong>Transizione</strong>: completamento del prodotto, beta test, rilascio.</li></ol>
 <div class="note"><strong>Fase ≠ disciplina!</strong> UP ha 4 <em>fasi</em> (ideazione→elaborazione→costruzione→transizione), ciascuna con più iterazioni. Le <em>discipline</em> sono le attività svolte dentro l'iterazione (modellazione del business, requisiti, progettazione, implementazione…).</div>
 <p>Ogni iterazione genera una <strong>Release</strong> (insieme di manufatti previsti e approvati). Un <strong>Incremento</strong> è la differenza tra una release e la successiva. Lo <strong>scenario di sviluppo</strong> documenta la personalizzazione di UP.</p>
 <p><strong>Cattive pratiche / "non hai capito UP" se</strong>: definisci tutti i requisiti all'inizio (cascata); pensi che gli UML siano dettagliati a livello codice; pensi che ideazione=requisiti, elaborazione=progettazione, costruzione=implementazione; produci più elaborati possibile; pianifichi tutto in dettaglio dall'inizio. <span class="src blue">Blue</span> <span class="src sofia">Sofia</span></p>`},
 {h:"Metodo Agile e Agile Modeling",src:"app,blue,sofia",html:`<p>Lo <strong>sviluppo agile</strong> è una forma di sviluppo iterativo che incoraggia una risposta rapida e flessibile ai cambiamenti. Applica iterazioni brevi timeboxed e pianificazione iterativa; promuove consegne incrementali, valori agili (semplicità, leggerezza, valore delle persone, comunicazione) e pratiche agili (programmazione a coppie, TDD, refactoring).</p>
 <p><strong>Agile Modeling</strong>: lo scopo dei modelli è <strong>comprendere e comunicare</strong>, non documentare. Modellare e applicare UML solo alle parti difficili/insolite/insidiose, con lo strumento più semplice, <strong>a coppie</strong> (o in tre), sapendo che tutti i modelli sono incompleti e imprecisi.</p>
 <p><strong>UP agile</strong>: piccolo insieme di attività/elaborati; requisiti e progettazione emergono in modo adattivo durante le iterazioni; UML in spirito agile; pianificazione iterativa e adattiva.</p>`},
 {h:"Scrum",src:"app,blue,sofia",html:`<p>Metodo agile focalizzato su <strong>organizzazione del lavoro e gestione dei progetti</strong>, combinabile con altri metodi.</p>
 <table class="gt"><tr><th>Termine</th><th>Descrizione</th></tr>
 <tr><td><strong>Scrum</strong></td><td>Incontro giornaliero (Daily) del team che esamina i progressi e definisce le priorità del giorno; breve, faccia a faccia.</td></tr>
 <tr><td><strong>ScrumMaster</strong></td><td>Assicura che Scrum sia seguito, guida il team; interfaccia con il resto dell'azienda. Non è il project manager: il team si autogestisce.</td></tr>
 <tr><td><strong>Sprint</strong></td><td>Iterazione di sviluppo, di solito 2-4 settimane.</td></tr>
 <tr><td><strong>Velocity</strong></td><td>Stima di quanto lavoro un team può fare in uno sprint.</td></tr>
 <tr><td><strong>Team di sviluppo</strong></td><td>Gruppo auto-organizzato, idealmente ≤7 persone.</td></tr>
 <tr><td><strong>Incremento potenzialmente rilasciabile</strong></td><td>L'incremento sw fornito da uno sprint, in stato "trasportabile".</td></tr>
 <tr><td><strong>Product backlog</strong></td><td>Elenco di elementi "da fare" (caratteristiche, requisiti, storie utente…).</td></tr>
 <tr><td><strong>Product owner</strong></td><td>Individuo/piccolo gruppo che identifica e prioritizza i requisiti, rivede il backlog.</td></tr></table>`}
]},
{id:"requisiti",icon:"📋",title:"3 · Ideazione e Requisiti",blocks:[
 {h:"Ideazione",src:"app,blue,sofia",html:`<p>Breve passo iniziale per definire la <strong>visione</strong> del progetto e una stima grossolana di costi/tempi. Richiede esplorazione di ~<strong>10% dei requisiti funzionali</strong>. È l'<strong>iterazione zero</strong>: non produce software eseguibile.</p>
 <p>Scopo: stabilire una visione comune, stabilire se il progetto è <strong>fattibile</strong>, decidere se proseguire con un'indagine seria nell'elaborazione. <strong>NON</strong> è la fase dei requisiti (la maggior parte si fa nell'elaborazione). Si dettaglia solo il 10-20% dei casi d'uso (i più influenti sull'architettura). SSD e Contratti <strong>non</strong> si fanno nell'ideazione.</p>
 <p>Elaborati iniziati: Visione e studio economico, Modello dei Casi d'uso (nomi della maggior parte), Specifiche supplementari, Glossario, Lista dei rischi, Prototipi/proof of concept, Piano dell'iterazione, Scenario di sviluppo.</p>
 <div class="note"><strong>"Non hai capito l'ideazione se…"</strong> dura più di qualche settimana, provi a definire la maggior parte dei requisiti, ti aspetti piani/stime affidabili, definisci l'architettura, manca la Visione, tutti (o nessuno) i casi d'uso sono in dettaglio.</div>`},
 {h:"Requisiti",src:"app,blue,sofia",html:`<div class="def"><b>Requisito.</b> Una capacità o condizione a cui il sistema (e il progetto) deve essere conforme.</div>
 <p>Il <strong>34%</strong> delle cause di fallimento dei progetti riguarda i requisiti. Devono essere <strong>completi</strong> e <strong>coerenti</strong>. Due tipi:</p>
 <ul><li><strong>Funzionali (comportamentali)</strong>: funzionalità/servizi, risposte attese, output su input. Elaborato: <strong>Casi d'uso</strong>.</li>
 <li><strong>Non funzionali</strong>: proprietà del sistema (sicurezza, prestazioni, affidabilità, usabilità…). Elaborato: <strong>Specifiche supplementari</strong>. Spesso più vincolanti dei funzionali; un NF può generare più requisiti funzionali correlati.</li></ul>
 <p><strong>Obiettivi</strong> vs <strong>requisiti non funzionali verificabili</strong>: gli obiettivi sono intenzioni generali (difficili da quantificare); a ogni obiettivo va associato un requisito NF verificabile con misure oggettive. <span class="src sofia">Sofia</span> <span class="src blue">Blue</span></p>`},
 {h:"FURPS+",src:"sofia",html:`<p>Classificazione di uso comune dei requisiti secondo il modello <strong>FURPS+</strong>:</p>
 <ul><li><strong>F</strong>unctionality — funzionalità, capacità, sicurezza.</li>
 <li><strong>U</strong>sability — facilità d'uso, documentazione, user aid.</li>
 <li><strong>R</strong>eliability — disponibilità, tolleranza ai guasti, accuratezza.</li>
 <li><strong>P</strong>erformance — tempi di risposta, capacità, uso risorse.</li>
 <li><strong>S</strong>upportability (Sostenibilità) — adattabilità, manutenibilità, configurabilità, localizzazione.</li></ul>`},
 {h:"Linee guida per scrivere i requisiti",src:"app,sofia",html:`<ul><li>Ideare un <strong>formato standard</strong> e usarlo per tutti.</li>
 <li><strong>DEVE</strong> per i requisiti obbligatori, <strong>DOVREBBE</strong> per quelli desiderabili.</li>
 <li>Usare evidenziazione per le parti importanti; evitare il gergo informatico.</li>
 <li>Includere il <strong>razionale</strong> (perché serve una disposizione).</li></ul>
 <p>Elaborati di UP sui requisiti: Modello dei casi d'uso, Specifiche supplementari, Glossario, Visione, Regole di business (politiche che trascendono il singolo progetto). <span class="src sofia">Sofia</span></p>`}
]},
{id:"casiuso",icon:"🎭",title:"4 · Casi d'uso",blocks:[
 {h:"Cosa sono",src:"app,blue,sofia",html:`<div class="def"><b>Caso d'uso.</b> Storia scritta in linguaggio naturale di un attore che usa un sistema per raggiungere un obiettivo. Una <b>collezione di scenari</b> correlati, di successo e di fallimento.</div>
 <p>Sono ampiamente usati per scoprire e registrare i <strong>requisiti funzionali</strong>. <strong>Non sono diagrammi</strong>, sono testi; <strong>non sono orientati agli oggetti</strong>. Un caso d'uso definisce un <strong>contratto</strong> relativo al comportamento del sistema. Sono comprensibili ai clienti, mettono in risalto gli obiettivi degli utenti, utili per guida utente e test.</p>`},
 {h:"Attori e scenari",src:"app,blue,sofia",html:`<p>Un <strong>attore</strong> è qualcosa/qualcuno dotato di comportamento (anche il SuD quando usa altri sistemi). Tipi:</p>
 <ul><li><strong>Primario</strong>: raggiunge obiettivi usando il SuD (es. cassiere).</li>
 <li><strong>Finale</strong>: vuole che il SuD venga usato per raggiungere i suoi obiettivi (es. cliente).</li>
 <li><strong>Di supporto</strong>: offre un servizio al SuD (es. servizio autorizzazione pagamenti).</li>
 <li><strong>Fuori scena</strong>: ha interesse nel comportamento del caso d'uso ma non interviene (es. ente fiscale).</li></ul>
 <p><strong>Scenario (istanza di caso d'uso)</strong>: sequenza specifica di azioni e interazioni tra sistema e attori; di successo o fallimento. Passi di 3 tipi (Sofia): interazione tra attori, cambiamento di stato del sistema, validazione.</p>
 <p>Il <strong>Modello dei casi d'uso</strong> = testi dei casi d'uso + SSD + contratti + (opzionale) diagramma UML.</p>`},
 {h:"Formati e livelli",src:"app,blue,sofia",html:`<p><strong>Formati</strong>: breve (un paragrafo, solo scenario principale), informale (più paragrafi), <strong>dettagliato</strong> (tutti i passi e variazioni; 3-10 pagine).</p>
 <p><strong>Livelli</strong>: obiettivo utente (il più interessante in analisi), sotto-funzione, sommario.</p>
 <h4>Template del caso d'uso dettagliato</h4>
 <table class="gt"><tr><th>Sezione</th><th>Descrizione</th></tr>
 <tr><td>Nome</td><td>Inizia con un verbo</td></tr><tr><td>Portata</td><td>Nome del SuD (confini del sistema)</td></tr>
 <tr><td>Livello</td><td>Obiettivo utente / sotto-funzione / sommario</td></tr><tr><td>Attore primario</td><td>Chi usa direttamente il sistema</td></tr>
 <tr><td>Parti interessate e interessi</td><td>A chi interessa e perché</td></tr><tr><td>Pre-condizioni</td><td>Cosa è vero all'inizio</td></tr>
 <tr><td>Garanzia di successo</td><td>Cosa è vero se completato con successo</td></tr><tr><td>Scenario principale di successo</td><td>Attraversamento comune, incondizionato</td></tr>
 <tr><td>Estensioni</td><td>Scenari alternativi, successo/fallimento</td></tr><tr><td>Requisiti speciali</td><td>Requisiti NF verificabili correlati</td></tr>
 <tr><td>Elenco varianti tecnologiche/dati</td><td>Varianti I/O e formato dati</td></tr><tr><td>Frequenza di ripetizione · Varie</td><td>Frequenza, problemi aperti</td></tr></table>`},
 {h:"Stesura, test di utilità",src:"app,blue,sofia",html:`<p>Scrivere in <strong>stile essenziale</strong> (ignora la UI, si concentra sullo scopo dell'attore) e a <strong>scatola nera</strong> (cosa fa il sistema, non come). Soggetto-verbo-oggetto chiari (es. "il sistema autentica l'amministratore").</p>
 <p><strong>Come trovarli</strong>: (1) scegliere il confine di sistema, (2) identificare gli attori primari, (3) gli obiettivi di ogni attore, (4) definire i casi d'uso. Eccezione CRUD → "Gestisci X".</p>
 <h4>I 3 test di utilità</h4>
 <ul><li><strong>Test del capo</strong>: se la risposta a "cosa hai fatto tutto il giorno?" è "il login!" e il capo non è felice → il caso d'uso non mira a risultati di valore misurabile.</li>
 <li><strong>Test EBP (Elementary Business Process)</strong>: non un singolo passo (5-10 passi), in una sola sessione, in risposta a un evento di business, con valore osservabile e misurabile, lascia il sistema in stato stabile e coerente.</li>
 <li><strong>Test della dimensione</strong>: non troppo breve; nel formato dettagliato spesso 3-10 pagine.</li></ul>
 <p>Violazioni ragionevoli: attività secondarie/piccoli passi (es. login complesso per single sign-on).</p>`},
 {h:"Diagramma dei casi d'uso",src:"app,blue,sofia",html:`<p>Buon <strong>diagramma di contesto</strong>: mostra confini del sistema, cosa è esterno, come è usato. Include di solito solo i casi d'uso a livello di obiettivo utente. Le <strong>associazioni</strong> attore-caso d'uso (linea continua) indicano un canale di comunicazione; la direzione indica chi inizia.</p>
 <p><strong>Tre relazioni tra casi d'uso</strong>:</p>
 <ul><li><strong>Include</strong>: il caso d'uso incluso è eseguito sempre e completamente nel caso base (che senza di esso è incompleto).</li>
 <li><strong>Extend</strong>: aggiunge varianti a un caso base; eseguito solo se la condizione di estensione è vera, in corrispondenza di <em>extension point</em>.</li>
 <li><strong>Generalizzazione</strong>: il caso genitore generalizza il figlio (che eredita, aggiunge, sovrascrive — tranne relazioni ed extension point). Applicabile anche agli attori.</li></ul>`}
]},
{id:"dominio",icon:"🗺️",title:"5 · Analisi OO e Modello di Dominio",blocks:[
 {h:"Elaborazione",src:"app,blue,sofia",html:`<p>Serie iniziale di iterazioni (2+ iterazioni di 2-6 settimane) in cui: si programma e verifica il nucleo (rischioso) dell'<strong>architettura</strong>, si scopre e stabilizza la maggior parte dei requisiti (~80%), si attenuano i rischi maggiori, si raffinano stime. Si produce codice di <strong>qualità di produzione</strong> testato realisticamente.</p>
 <p>I requisiti/iterazioni si organizzano per <strong>Rischio</strong>, <strong>Copertura</strong> (parti principali del sistema) e <strong>Criticità</strong> (valore di business); ordinati con tecniche di votazione.</p>`},
 {h:"Modello di Dominio",src:"app,blue,sofia",html:`<div class="def"><b>Modello di dominio.</b> Il modello più importante dell'Analisi OO. Rappresentazione visuale di <b>classi concettuali</b> (non software) e delle loro relazioni in un dominio di interesse — un "<b>dizionario visuale</b>".</div>
 <p>In UML: uno o più diagrammi delle classi <strong>senza operazioni</strong> che mostrano classi concettuali, associazioni e attributi. Fonte d'ispirazione per lo strato del dominio; iterativo/incrementale; limitato dai requisiti dell'iterazione corrente.</p>
 <div class="note"><strong>NON</strong> è una raffigurazione di oggetti software: non mostra elementi software, metodi o responsabilità. Diverso dal <strong>modello dei dati</strong> (che mostra dati persistenti); può contenere classi senza attributi o con ruolo puramente comportamentale.</div>`},
 {h:"Classi concettuali e attributi",src:"app,blue,sofia",html:`<p>Una <strong>classe concettuale</strong> è considerata in termini di: <strong>simbolo</strong> (parola/immagine), <strong>intensione</strong> (definizione in linguaggio naturale), <strong>estensione</strong> (insieme degli oggetti descritti).</p>
 <p>Tre strategie per trovarle: (1) riusare/modificare modelli esistenti, (2) usare un <strong>elenco di categorie comuni</strong> (transazioni, righe di transazione, prodotti/servizi, ruoli, luoghi, eventi, oggetti fisici, descrizioni, cataloghi, contenitori…), (3) identificare <strong>nomi e locuzioni nominali</strong>.</p>
 <p>Una <strong>classe descrizione</strong> (es. <code>ProductDescription</code>) contiene info che descrivono qualcos'altro: utile per ridurre ridondanza ed evitare perdita di info quando si cancellano istanze.</p>
 <p><strong>Attributo</strong>: proprietà elementare. Sintassi: <code>visibility name : type multiplicity = default {property-string}</code>. Tipi primitivi (Boolean, Date, Number, String, Time…). Attributi <strong>derivati</strong> con prefisso <code>/</code>. <strong>Non</strong> usare attributi come chiavi esterne: i tipi si correlano con <strong>associazioni</strong>, non con attributi.</p>`},
 {h:"Associazioni, aggregazione, composizione",src:"app,blue,sofia",html:`<p><strong>Associazione</strong>: relazione semantica tra classi; le istanze sono <strong>collegamenti (link)</strong>. Si mostrano se la relazione va memorizzata ed è significativa. Ha nome, <strong>ruoli</strong>, <strong>molteplicità</strong>, <strong>navigabilità</strong>. Può essere riflessiva (simmetrica/asimmetrica).</p>
 <table class="gt"><tr><th></th><th>Aggregazione (rombo vuoto)</th><th>Composizione (rombo pieno)</th></tr>
 <tr><td>Legame</td><td>Debole "tutto-parte"</td><td>Forte "tutto-parte"</td></tr>
 <tr><td>Vita parte</td><td>La parte può esistere indipendentemente</td><td>La parte appartiene a UN solo composto e dipende da esso</td></tr>
 <tr><td>Condivisione</td><td>Più aggregati possono condividere una parte</td><td>No</td></tr>
 <tr><td>Responsabilità</td><td>—</td><td>Il composto crea/cancella le parti (se distrutto, distrugge o cede le parti)</td></tr>
 <tr><td>Esempio</td><td>Computer–Stampante</td><td>Mouse–Pulsante; Board–Square</td></tr></table>
 <p>Molteplicità (lato del tutto, almeno 1 nella composizione). La composizione aiuta a identificare il <strong>Creator</strong>; alcune proprietà/operazioni dell'intero si propagano alle parti.</p>`},
 {h:"Basso salto rappresentazionale (LRG) e diagramma degli oggetti",src:"app,blue,sofia",html:`<p>Usare nomi delle classi software ispirati al Modello di Dominio comporta un <strong>basso salto rappresentazionale</strong> (LRG): facilità di comprensione e collegamento tra modello mentale del dominio e codice.</p>
 <p>Il <strong>diagramma degli oggetti</strong> mostra oggetti (livello <em>estensionale</em>) con valori e collegamenti, mentre il modello di dominio è a livello <em>intensionale</em> (classi e associazioni). Stessa notazione del diagramma delle classi.</p>`}
]},
{id:"ssd",icon:"📨",title:"6 · SSD e Contratti",blocks:[
 {h:"Diagramma di Sequenza di Sistema (SSD)",src:"app,blue,sofia",html:`<div class="def"><b>SSD.</b> Mostra, per uno scenario di un caso d'uso, gli <b>eventi di input/output</b> tra gli attori esterni e il sistema, considerato a <b>scatola nera</b>.</div>
 <p>Mostra: attori esterni che interagiscono direttamente, il sistema come scatola nera, gli <strong>eventi di sistema</strong> generati dagli attori (in ordine). Un sistema reagisce a 3 tipi di eventi: <strong>esterni da attori</strong>, <strong>temporali</strong>, <strong>guasti/eccezioni</strong> (negli SSD ci si occupa dei primi).</p>
 <p><strong>Evento di sistema</strong>: evento esterno di input. <strong>Operazione di sistema</strong>: trasformazione/interrogazione che il sistema esegue per gestire l'evento; l'insieme di tutte le operazioni di sistema è l'<strong>interfaccia di sistema pubblica</strong>. UML non definisce "di sistema": è una qualifica.</p>
 <p>Linee guida: nomi a livello <strong>astratto/di intenzione</strong>, con verbo (es. <code>enterItem</code> non <code>scan</code>); parametri semplici (tipi di dato); risposte come elenco di dati restituiti. Si disegna un SSD per lo scenario principale di successo (e alternativi frequenti/complessi). Creati per lo più nell'elaborazione.</p>`},
 {h:"Contratti delle operazioni di sistema",src:"app,blue,sofia",html:`<p>Descrivono in modo dettagliato i <strong>cambiamenti agli oggetti del modello di dominio</strong> causati da un'operazione di sistema, usando <strong>pre-condizioni</strong> e (soprattutto) <strong>post-condizioni</strong>. Parte del Modello dei casi d'uso, complementari ai casi d'uso, scritti solo per operazioni complesse, per lo più nell'elaborazione.</p>
 <table class="gt"><tr><th>Sezione</th><th>Contenuto</th></tr>
 <tr><td>Operazione</td><td>Nome e parametri (firma)</td></tr><tr><td>Riferimenti</td><td>Casi d'uso in cui può verificarsi</td></tr>
 <tr><td>Pre-condizioni</td><td>Ipotesi significative sullo stato del sistema prima dell'operazione</td></tr>
 <tr><td>Post-condizioni</td><td><strong>La sezione più importante</strong>: cambiamenti di stato degli oggetti dopo l'operazione</td></tr></table>
 <p><strong>Post-condizioni</strong>: non azioni, ma <strong>osservazioni sullo stato</strong> dopo l'operazione, scritte al <strong>passato e in forma passiva</strong>. Tre categorie: <strong>creazione/cancellazione di istanza</strong>, <strong>modifica di valore di attributo</strong>, <strong>formazione/rottura di collegamento</strong>.</p>
 <div class="note"><strong>Analogia del palcoscenico</strong>: foto prima → si chiude il sipario e si applica l'operazione → foto dopo. Le post-condizioni esprimono le differenze osservate (es. "è stata creata una SalesLineItem…").</div>
 <p><strong>Punto di vista della conoscenza</strong>: "è stata creata un'istanza X" = "è iniziata la conoscenza da parte del sistema di X". <strong>OCL</strong> (Object Constraint Language) è il linguaggio formale per esprimere i vincoli. Operazione = astrazione; <strong>metodo</strong> = implementazione.</p>`}
]},
{id:"architettura",icon:"🏛️",title:"7 · Architettura Logica",blocks:[
 {h:"Architettura software e logica",src:"app,blue,sofia",html:`<div class="def"><b>Architettura software.</b> Insieme delle decisioni significative sull'organizzazione di un sistema: elementi strutturali, loro interfacce e comportamento, composizione e stile architetturale. È a larga scala.</div>
 <p>L'<strong>architettura logica</strong> è l'organizzazione su larga scala delle classi software in <strong>package/strati/sottoinsiemi</strong>. "Logica" perché non decide la distribuzione fisica (deployment). Si illustra con un <strong>diagramma dei package UML</strong> (namespace, es. <code>java::util::Date</code>; dipendenze tratteggiate).</p>
 <p>Architettura a <strong>N+1 viste</strong> (Blue, comune a 6): logica, di processo, di rilascio, dei dati, di implementazione, dei casi d'uso (la "+1" fissa). <span class="src blue">Blue</span></p>`},
 {h:"Architettura a strati",src:"app,blue,sofia",html:`<p>Uno <strong>strato</strong> è un gruppo a grana grossa di classi/package con responsabilità coese; gli strati alti usano i servizi dei bassi. Due tipi: <strong>stretta</strong> (solo lo strato immediatamente sottostante) e <strong>rilassata</strong> (anche strati più bassi di vari livelli — comune nei sistemi informatici).</p>
 <p>Strati tipici: <strong>Presentazione/UI</strong>, <strong>Logica applicativa/Dominio</strong>, <strong>Servizi tecnici</strong>. Sofia li dettaglia: UI, Application, Domain, Business Infrastructure, Technical Services, Foundation.</p>
 <p><strong>Vantaggi</strong>: separazione degli interessi (riduce accoppiamento, migliora coesione/riuso/chiarezza), incapsulamento della complessità, sostituibilità degli strati, riuso degli strati bassi, distribuibilità, sviluppo per team.</p>
 <p><strong>Oggetto di dominio</strong>: oggetto software con nome/info simili al dominio reale, con logica applicativa (es. <code>Sale</code> calcola il totale). Lo strato della logica applicativa è più precisamente lo <strong>strato del dominio</strong>.</p>`},
 {h:"Principio di separazione Modello-Vista",src:"app,sofia",html:`<p>Gli oggetti di dominio (modello) <strong>non devono</strong> essere connessi/accoppiati direttamente agli oggetti UI (vista). La logica applicativa non va nei metodi UI; gli oggetti UI inizializzano elementi UI, ricevono eventi e <strong>delegano</strong> la logica agli oggetti di dominio.</p>
 <div class="note">Rilassamento legittimo: il pattern <strong>Observer</strong>, in cui gli oggetti di dominio inviano messaggi alla UI <em>indirettamente</em> tramite un'interfaccia (es. <code>PropertyListener</code>), senza conoscerne la classe concreta.</div>
 <p>Definizioni: <strong>Tier</strong> (livello) = nodo fisico; <strong>Layer</strong> (strato) = sezione verticale; <strong>Partition</strong> (partizione) = divisione orizzontale di sottosistemi di uno strato.</p>`}
]},
{id:"interazione",icon:"🔗",title:"8 · Progettare a oggetti e Diagrammi di Interazione",blocks:[
 {h:"Progettare a oggetti",src:"app,blue,sofia",html:`<p>Tre modi: <strong>codifica</strong> (progettare mentre si codifica, con TDD/refactoring), <strong>disegno poi codifica</strong> (UML → codice; il più diffuso), <strong>solo disegno</strong> (generazione automatica). Tempo per UML: per un'iterazione di 3 settimane, alcune ore/max un giorno, poi codifica; usare il <strong>reverse-engineering</strong>.</p>
 <p>Due tipi di modelli, da creare <strong>in parallelo</strong>: <strong>statici</strong> (diagrammi delle classi, package, deployment — struttura) e <strong>dinamici</strong> (sequenza, comunicazione, stati, attività — comportamento; qui si applicano RDD e GRASP). I dinamici sono i più importanti e difficili.</p>
 <p>Tecnica testuale alternativa: <strong>schede CRC</strong> (Class, Responsibility, Collaboration). L'importante non è conoscere UML ma saper <strong>pensare e progettare a oggetti</strong>.</p>`},
 {h:"Diagrammi di interazione",src:"app,blue,sofia",html:`<p>Illustrano come gli oggetti interagiscono scambiandosi <strong>messaggi</strong>. Un'<strong>interazione</strong> è motivata da un compito, avviato da un <strong>messaggio trovato</strong>. Quattro tipi: <strong>Sequenza</strong>, <strong>Comunicazione</strong>, Interazione generale, Temporizzazione.</p>
 <table class="gt"><tr><th>Tipo</th><th>Enfasi</th><th>Punti di forza / debolezza</th></tr>
 <tr><td>Sequenza (SD)</td><td>Sequenza temporale ("a steccato", verticale)</td><td>+ Sequenza chiara, notazione ricca · − consuma spazio orizzontale</td></tr>
 <tr><td>Comunicazione (CD)</td><td>Relazioni strutturali ("a grafo/rete")</td><td>+ Economizza spazio, flessibile · − sequenza meno chiara (numerazione)</td></tr></table>
 <p>Sintassi messaggio: <code>return = message(par : tipo) : tipoRitorno</code>. Messaggi <strong>sincroni</strong> (punta piena), <strong>asincroni</strong> (punta vuota).</p>`},
 {h:"Notazione SD",src:"app,blue,sofia",html:`<ul><li><strong>Linea di vita</strong>: rettangolo + linea tratteggiata (vita dell'oggetto).</li>
 <li><strong>Barra di attivazione</strong>: periodo di esecuzione/focus di controllo (opzionale).</li>
 <li><strong>create</strong> (linea tratteggiata + freccia piena) e <strong>destroy</strong> (X grande che termina la lifeline).</li>
 <li><strong>Auto-delega</strong>: messaggio a self → attivazione annidata. <strong>Invarianti di stato</strong>: rettangoli arrotondati sulla lifeline.</li>
 <li>Oggetto <strong>Singleton</strong>: "1" in alto a destra. <strong>Note</strong> UML: commenti, vincoli {…}, corpo di metodo.</li></ul>
 <h4>Frammenti combinati (frames)</h4>
 <table class="gt"><tr><th>Operatore</th><th>Significato</th></tr>
 <tr><td><code>opt</code></td><td>Operando eseguito se la condizione è vera (if…then)</td></tr>
 <tr><td><code>alt</code></td><td>Eseguito l'operando la cui condizione è vera (switch/case; [else])</td></tr>
 <tr><td><code>loop</code></td><td>Ripetuto finché la guardia è vera; <code>loop min,max [cond]</code></td></tr>
 <tr><td><code>break</code></td><td>Se la guardia è vera, esegue l'operando e interrompe il resto</td></tr>
 <tr><td><code>ref</code></td><td>Riferimento a un'altra interazione</td></tr>
 <tr><td><code>par / seq / strict</code></td><td>Parallelismo / sequenza</td></tr>
 <tr><td><code>neg</code></td><td>Interazioni che NON devono accadere</td></tr>
 <tr><td><code>critical</code></td><td>Regione critica, eseguita atomicamente</td></tr></table>
 <p>Idiomi di loop: <code>loop *</code> (infinito), <code>loop n</code> (n volte), <code>loop [cond]</code> (while), <code>loop 1,* [cond]</code> (repeat), <code>loop [per ogni…]</code> (foreach).</p>`},
 {h:"Notazione CD",src:"blue,sofia",html:`<p>I <strong>Diagrammi di Comunicazione</strong> sono identici ai SD ma con organizzazione spaziale a grafo. Le lifeline non hanno la linea verticale. I messaggi hanno un <strong>numero di sequenza annidato</strong> (il messaggio trovato iniziale non si numera). Messaggi condizionali con clausola <code>[cond]</code>; percorsi mutuamente esclusivi con lettere (1a, 1b). Iterazione con <code>*</code> (e <code>*//</code> per il parallelo).</p>`}
]},
{id:"classi",icon:"🧱",title:"9 · Diagrammi delle Classi (DCD)",blocks:[
 {h:"Classe, oggetto, visibilità",src:"app,blue,sofia",html:`<p>Una <strong>classe</strong> è un rettangolo a 3 sezioni (nome / attributi / operazioni). Un <strong>oggetto</strong> (istanza) ha <strong>identità</strong> (id univoco), <strong>stato</strong> (valori degli attributi) e <strong>comportamento</strong> (operazioni). <strong>Incapsulamento</strong>: i dati sono nascosti, accessibili solo tramite operazioni.</p>
 <table class="gt"><tr><th>Simbolo</th><th>Visibilità</th><th>Accesso</th></tr>
 <tr><td>+</td><td>pubblica</td><td>da qualsiasi classe</td></tr><tr><td>-</td><td>privata (default)</td><td>solo dalle operazioni della classe</td></tr>
 <tr><td>#</td><td>protetta</td><td>classe e sottoclassi (discendenti)</td></tr><tr><td>~</td><td>package</td><td>nello stesso package</td></tr></table>`},
 {h:"Attributi, operazioni, associazioni",src:"app,blue,sofia",html:`<p><strong>Attributi</strong>: <code>visibility name : type multiplicity = default {property-string}</code>. Se la molteplicità non è indicata vale 1..1; se diversa, l'attributo è <strong>multivalore</strong>.</p>
 <p><strong>Operazioni</strong>: <code>visibility name(parameter-list) : return-type {property-string}</code>. <strong>create</strong> = costruttore; get/set spesso esclusi (basso rapporto disturbo/valore). Un <strong>metodo</strong> è l'implementazione; un'operazione polimorfica ha più implementazioni.</p>
 <p><strong>Associazioni</strong>: nome/ruoli/navigabilità/molteplicità; possono essere n-arie. Il <strong>ruolo</strong> è obbligatorio quando l'associazione insiste più volte sulla stessa classe ed è asimmetrica (es. padre-figlio). Una <strong>classe associazione</strong> va reificata. Proprietà delle collezioni: <code>{ordered}</code>, <code>{unordered}</code>, <code>{unique}</code>, <code>{nonunique}</code> (default: nonordered, unique).</p>`},
 {h:"Generalizzazione e specializzazione",src:"app,blue,sofia",html:`<p><strong>Generalizzazione (is-a)</strong>: ogni istanza della sottoclasse è anche istanza della superclasse; ogni proprietà della superclasse è anche della sottoclasse (ereditarietà, anche associazioni e molteplicità).</p>
 <p>Vincoli: <code>{disjoint}</code> / <code>{overlapping}</code> (istanze comuni o no) e <code>{complete}</code> / <code>{incomplete}</code> (l'unione delle sottoclassi copre la superclasse o no). Default: <strong>{overlapping, incomplete}</strong>.</p>
 <p><strong>Specializzazione</strong>: di attributo (tipo sottoinsieme), di associazione (<code>{subsets}</code>), di operazioni (override dei parametri/tipo ritorno). Classe con operazioni astratte → <strong>classe astratta</strong> (nome in corsivo o <code>{abstract}</code>); <code>{leaf}</code> per classi/operazioni finali.</p>`},
 {h:"Dipendenza, interfacce, profili",src:"app,blue,sofia",html:`<p><strong>Dipendenza</strong> (freccia tratteggiata cliente→fornitore): un cambiamento nel fornitore può influire sul cliente. Usata per visibilità globale, variabili parametro/locali, metodi statici. Etichette <code>&lt;&lt;call&gt;&gt;</code>, <code>&lt;&lt;create&gt;&gt;</code>.</p>
 <p><strong>Interfaccia</strong>: insieme di funzionalità pubbliche identificate da un nome; separa specifica e implementazione; definisce un contratto. Notazione <strong>lollipop</strong> (cerchio = interfaccia <em>fornita</em>) e <strong>socket</strong> (semicerchio = <em>richiesta</em>); si connettono con il <strong>connettore di assemblaggio</strong>. Ereditarietà = eredita implementazione; realizzazione interfaccia = definisce un contratto.</p>
 <p><strong>Profilo</strong>: insieme di <strong>stereotipi</strong> (nuovo elemento basato su uno esistente), <strong>tagged values/tag</strong> e <strong>vincoli</strong>, per personalizzare UML. Parole chiave: <code>&lt;&lt;actor&gt;&gt;</code>, <code>&lt;&lt;interface&gt;&gt;</code>, <code>{abstract}</code>, <code>{ordered}</code>. Template di classe; ereditarietà multipla → delegazione.</p>`}
]},
{id:"stati",icon:"⚙️",title:"10 · Macchine a Stati",blocks:[
 {h:"Concetti base",src:"app,blue,sofia",html:`<p>Modellano il comportamento dinamico di classificatori (classi, casi d'uso, sottosistemi, sistemi). Mostrano il <strong>ciclo di vita</strong> di un oggetto: <strong>stati</strong>, <strong>transizioni</strong> ed <strong>eventi</strong>. Oggetti <strong>indipendenti dallo stato</strong> (rispondono sempre uguale) vs <strong>dipendenti dallo stato</strong>. Due usi: modellare un oggetto reattivo complesso, o sequenze valide di operazioni (protocolli).</p>
 <p>Ogni macchina ha uno <strong>stato iniziale</strong> (pallino pieno) e uno <strong>finale</strong> (pallino con bordo). Uno <strong>stato</strong> ha azioni di ingresso/uscita, attività interne, transizioni interne. <strong>Azioni</strong> = istantanee e non interrompibili; <strong>attività</strong> = richiedono tempo finito, interrompibili.</p>`},
 {h:"Eventi e pseudostati",src:"app,blue,sofia",html:`<p><strong>Eventi</strong>: di <strong>chiamata</strong> (richiama un'operazione), di <strong>segnale</strong> (pacchetto asincrono), di <strong>variazione</strong> (condizione booleana che passa da falso a vero), <strong>temporale</strong> (<code>dopo(3 mesi)</code>, <code>quando(...)</code>).</p>
 <p><strong>Pseudostati</strong>: <strong>giunzione</strong> (pallino pieno, ricongiunge archi), <strong>selezione</strong> (diamante, diramazione con guardie mutuamente esclusive), <strong>ingresso/uscita</strong> di stato composito, <strong>memoria semplice (H)</strong> (ricorda l'ultimo sottostato), <strong>memoria multilivello (H*)</strong> (anche i sotto-sottostati), <strong>finale di stato composito</strong> (croce).</p>`},
 {h:"Stati compositi",src:"app,blue,sofia",html:`<p><strong>Stati compositi</strong>: una regione (semplici) o più regioni (<strong>ortogonali</strong>, sotto-macchine in parallelo). Lo stato finale ferma solo la regione; lo pseudo-stato finale termina l'intero stato composito. Uscita <strong>sincrona</strong> (tutte le regioni terminano) o <strong>asincrona</strong>. Comunicazione tra sotto-macchine via <strong>flag</strong> (attributi) o <strong>stati di sync</strong> (come code). <strong>Stati della sotto-macchina</strong> per riferirsi a un'altra macchina. In UP non esiste un modello dedicato agli stati.</p>`}
]},
{id:"attivita",icon:"🌊",title:"11 · Diagrammi di Attività",blocks:[
 {h:"Attività, nodi, archi",src:"app,blue,sofia",html:`<p>"Diagrammi di flusso OO": modellano un processo come rete di <strong>nodi</strong> connessi da <strong>archi</strong>. Associati a casi d'uso, classi, operazioni, processi di business.</p>
 <p>Tre categorie di <strong>nodi</strong>: <strong>azione</strong> (unità atomiche di lavoro), <strong>controllo</strong> (controllano il flusso), <strong>oggetto</strong> (oggetti usati). Due categorie di <strong>archi</strong>: flussi di <strong>controllo</strong> e flussi di <strong>oggetti</strong>.</p>`},
 {h:"Token game e nodi di controllo",src:"app,blue,sofia",html:`<p><strong>Token game</strong>: un <strong>token</strong> è un oggetto, dati o flusso di controllo. Un nodo azione esegue un <strong>AND logico</strong> sui token in entrata (parte quando c'è un token su ogni arco entrante) e una <strong>fork implicita</strong> su tutti gli archi uscenti.</p>
 <p><strong>Nodi di controllo</strong>: iniziale, finale attività (termina tutto), finale del flusso (termina un flusso), <strong>decisione</strong> (guardie mutuamente esclusive, <code>altrimenti</code>), <strong>fusione</strong> (unisce flussi alternativi), <strong>biforcazione</strong> (duplica in flussi concorrenti), <strong>ricongiunzione</strong> (sincronizza).</p>
 <p><strong>Nodi oggetto</strong>: pile/code di token, ordinamento FIFO/LIFO/selezione; <strong>Pin</strong> = nodo oggetto input/output di un'azione. <strong>Partizioni</strong> (swimlane): raggruppamento di azioni correlate. La stessa notazione si usa per i <strong>DFD</strong>. <span class="src blue">Blue</span></p>`}
]},
{id:"grasp",icon:"🎯",title:"12 · GRASP",blocks:[
 {h:"RDD — Responsibility-Driven Design",src:"app,blue,sofia",html:`<p>Approccio che considera un progetto OO come una <strong>comunità di oggetti con responsabilità che collaborano</strong>. Una <strong>responsabilità</strong> è "un contratto o obbligo di un classificatore" — ciò che un oggetto <em>fa</em> o <em>conosce</em>:</p>
 <ul><li><strong>Di fare</strong>: eseguire qualcosa (calcolo, creare oggetti), delegare ad altri, controllare/coordinare attività.</li>
 <li><strong>Di conoscere</strong>: i propri dati privati, gli oggetti correlati, cose derivabili/calcolabili.</li></ul>
 <p>Responsabilità ≠ metodo: i metodi <strong>implementano</strong> le responsabilità. Flusso RDD: (1) identifica una responsabilità, (2) chiediti a quale oggetto assegnarla, (3) chiediti come la soddisfa (da solo o collaborando).</p>
 <div class="def"><b>Pattern.</b> Coppia problema/soluzione ben conosciuta e con un nome; codifica soluzioni già provate (esperienza, non sperimentazione). I <b>GRASP</b> (General Responsibility Assignment Software Patterns) danno i principi per assegnare le responsabilità.</div>`},
 {h:"I 9 pattern GRASP",src:"app,blue,sofia",html:`<p>I materiali trattano <strong>9 pattern GRASP</strong> (né più né meno):</p>
 <table class="gt"><tr><th>Pattern</th><th>Problema → Soluzione</th></tr>
 <tr><td><strong>Creator</strong></td><td>Chi crea A? → la classe B che contiene/aggrega (composizione), registra, usa strettamente A, o ha i dati per inizializzarlo. Es: <code>Sale</code> crea <code>SalesLineItem</code>; <code>Board</code> crea <code>Square</code>.</td></tr>
 <tr><td><strong>Information Expert</strong></td><td>A quale oggetto assegnare una responsabilità? → a chi possiede le informazioni necessarie. Es: <code>Sale</code> calcola il totale; <code>Board</code> conosce le <code>Square</code>.</td></tr>
 <tr><td><strong>Low Coupling</strong></td><td>Come ridurre l'impatto dei cambiamenti? → assegna le responsabilità mantenendo basso l'accoppiamento (non necessario).</td></tr>
 <tr><td><strong>Controller</strong></td><td>Chi è il primo oggetto oltre la UI a ricevere un'operazione di sistema? → un <em>facade controller</em> (sistema/radice/sottosistema) o un <em>use-case controller</em> (scenario di caso d'uso). Es: <code>Register</code>.</td></tr>
 <tr><td><strong>High Cohesion</strong></td><td>Come tenere gli oggetti focalizzati e gestibili? → responsabilità logicamente correlate. Livelli: molto bassa / bassa / moderata / alta.</td></tr>
 <tr><td><strong>Pure Fabrication</strong></td><td>Quando Expert violerebbe coesione/accoppiamento → assegna a una <em>classe artificiale</em> coesa (non di dominio).</td></tr>
 <tr><td><strong>Polymorphism</strong></td><td>Come gestire alternative basate sul tipo? → assegna il comportamento ai tipi con <em>operazioni polimorfe</em>.</td></tr>
 <tr><td><strong>Indirection</strong></td><td>Come evitare accoppiamento diretto? → un <em>oggetto intermediario</em> che media.</td></tr>
 <tr><td><strong>Protected Variations</strong></td><td>Come evitare che le variazioni si propaghino? → un'<em>interfaccia stabile</em> attorno ai punti di variazione previsti.</td></tr></table>`},
 {h:"Controller: dettagli ed errori comuni",src:"app,blue,sofia",html:`<p>Il controller è un <strong>pattern di delega</strong> (UI → dominio): deve <strong>coordinare</strong>, non eseguire il lavoro. Suggerito usare la <strong>stessa classe controller</strong> per tutte le operazioni di un caso d'uso.</p>
 <p><strong>Controller gonfio</strong> (coesione bassa): un unico controller per troppe operazioni, fa lavoro prima di delegare, conserva troppe informazioni. Soluzioni: aggiungere controller, delegare alle classi del dominio, separare UI dal dominio (Layers).</p>`},
 {h:"High Cohesion: livelli",src:"app,blue,sofia",html:`<ul><li><strong>Molto bassa</strong>: una classe responsabile di molte cose in aree funzionali diverse.</li>
 <li><strong>Bassa</strong>: un compito complesso in una sola area.</li>
 <li><strong>Moderata</strong>: responsabilità leggere in poche aree correlate.</li>
 <li><strong>Alta</strong>: responsabilità moderate in un'unica area funzionale, collabora con le altre (favorisce il riuso).</li></ul>
 <div class="note">Low Coupling e High Cohesion sono <strong>principi di valutazione</strong> da tenere a mente in tutte le decisioni di progetto. Realizzazione di caso d'uso: come un caso d'uso è realizzato nel Modello di Progetto da oggetti che collaborano. <span class="src sofia">Sofia</span></div>`}
]},
{id:"gofteoria",icon:"🧩",title:"13 · Design Pattern GoF (i 7 trattati)",blocks:[
 {h:"Cosa sono i GoF",src:"app,blue,sofia",html:`<p>I <strong>Design Pattern GoF</strong> (Gang of Four: Gamma, Helm, Johnson, Vlissides) sono i 23 pattern classici, classificati per <strong>scopo</strong> in: <strong>Creazionali</strong> (istanziazione), <strong>Strutturali</strong> (organizzazione di classi/oggetti), <strong>Comportamentali</strong> (interazione/comportamento); e per <strong>raggio d'azione</strong> (classi/oggetti). A differenza dei GRASP (consigli), i design pattern mostrano anche lo <strong>schema delle classi</strong>.</p>
 <div class="note"><strong>In questo corso si vedono 7 dei 23 GoF</strong>: <strong>Adapter, Factory, Singleton, Strategy, Composite, Facade, Observer</strong>. Gli altri compaiono solo come nomi nella tabella di classificazione, senza trattazione. Molti GoF si analizzano in termini di GRASP.</div>
 <p>Vai alla sezione <span class="jump" onclick="go('uml')">🧩 UML dei GoF</span> per gli schemi disegnati e la guida "come ridisegnarli a mano".</p>`},
 {h:"In sintesi (problema → soluzione)",src:"app,blue,sofia",html:`<table class="gt"><tr><th>Pattern</th><th>Cat.</th><th>Problema → Soluzione</th></tr>
 <tr><td><strong>Adapter</strong></td><td>Strutturale</td><td>Interfacce incompatibili → un oggetto adattatore intermedio converte l'interfaccia. Classe (ereditarietà) / Oggetto (composizione).</td></tr>
 <tr><td><strong>Factory</strong></td><td>Creazionale</td><td>Creazione complessa/separata → una <em>Pure Fabrication</em> "Factory" che gestisce la creazione (metodi che ritornano interfacce).</td></tr>
 <tr><td><strong>Singleton</strong></td><td>Creazionale</td><td>Una sola istanza con accesso globale → metodo statico <code>getInstance()</code>, costruttore privato.</td></tr>
 <tr><td><strong>Strategy</strong></td><td>Comportamentale</td><td>Algoritmi/politiche variabili → ciascuno in una classe separata con interfaccia comune.</td></tr>
 <tr><td><strong>Composite</strong></td><td>Strutturale</td><td>Trattare composto e atomico uniformemente → stessa interfaccia per oggetti composti e foglie.</td></tr>
 <tr><td><strong>Facade</strong></td><td>Strutturale</td><td>Sottosistema complesso → un punto di contatto unico (facciata).</td></tr>
 <tr><td><strong>Observer</strong></td><td>Comportamentale</td><td>Notificare più oggetti al cambio di stato → interfaccia subscriber/listener, registrazione dinamica.</td></tr></table>`}
]},
{id:"visibilita",icon:"👁️",title:"14 · Visibilità, TDD, Refactoring",blocks:[
 {h:"Progettare la visibilità",src:"app,blue,sofia",html:`<div class="def"><b>Visibilità.</b> Capacità di un oggetto di "vedere" o avere un riferimento a un altro oggetto. Per inviare un messaggio a B, A deve avere visibilità su B.</div>
 <p><strong>Quattro modi</strong>:</p>
 <ul><li><strong>Per attributo</strong>: B è attributo di A — <em>permanente</em> (persiste finché A e B esistono).</li>
 <li><strong>Per parametro</strong>: B passato come parametro a un metodo di A — <em>temporanea</em>.</li>
 <li><strong>Locale</strong>: B è variabile locale in un metodo di A — <em>temporanea</em> (nuova istanza o ritorno di metodo).</li>
 <li><strong>Globale</strong>: B globalmente visibile — <em>permanente</em> (in Java si simula con <strong>Singleton</strong>).</li></ul>
 <p>Trasformazioni: locale→parametro, parametro→attributo, locale→attributo (rende più duratura una visibilità temporanea).</p>`},
 {h:"Dalla progettazione al codice",src:"app,blue,sofia",html:`<p>Gli elaborati di progettazione sono input per la generazione del codice. Implementare richiede definire classi/interfacce, dichiarare variabili d'istanza, definire metodi e costruttori. Si implementa dalla classe <strong>meno accoppiata</strong> alla più accoppiata. Dai DCD si ricavano definizioni di classi; dai diagrammi di interazione si ricavano i corpi dei metodi.</p>
 <div class="note">Nota per l'orale: se un attributo implementa un'interfaccia, dichiarare la variabile d'istanza in termini dell'<strong>interfaccia</strong>, non della classe concreta: <code>private List&lt;SalesLineItem&gt; lineItems = new ArrayList&lt;&gt;();</code> <span class="src blue">Blue</span></div>`},
 {h:"TDD — Test-Driven Development",src:"app,blue,sofia",html:`<p>Tecnica agile (promossa da XP, compatibile con UP/Scrum). <strong>Ciclo</strong>: (1) scrivi un test che <strong>fallisce</strong> per una funzione non ancora esistente; (2) scrivi il codice <strong>minimo</strong> per farlo passare; (3) <strong>rifattorizza</strong> mantenendo il test verde.</p>
 <p><strong>Vantaggi</strong>: i test vengono scritti davvero; codice più chiaro e documentato dal comportamento; interfacce più stabili; fiducia nel cambiare; verifica automatica e ripetibile.</p>
 <p><strong>Tipi di test</strong>: di <strong>unità</strong> (singole classi/metodi), di <strong>integrazione</strong>, di <strong>sistema</strong> (end-to-end), di <strong>accettazione</strong> (validazione con il cliente).</p>
 <p><strong>Schema test unitario</strong>: <strong>Preparazione</strong> (crea la <em>fixture</em>) → <strong>Esecuzione</strong> → <strong>Verifica</strong> → <strong>Rilascio</strong> (opzionale). Framework: famiglia <strong>xUnit</strong> (JUnit per Java). Ciclo base o doppio (test unitari rapidi + test di accettazione più lenti).</p>`},
 {h:"Refactoring",src:"app,blue,sofia",html:`<div class="def"><b>Refactoring.</b> Metodo strutturato e disciplinato per riscrivere/riorganizzare codice esistente <b>senza modificarne il comportamento esterno</b>, con piccoli passi e test continui dopo ogni modifica.</div>
 <p><strong>Quando</strong>: <strong>Regola del Tre</strong> (codice riusato ≥3 volte), aggiunta di funzionalità, correzione di un bug (ma il refactoring <strong>non</strong> corregge i bug), revisione del codice. <strong>Processo</strong>: test passano → trova code smell → migliora → ri-testa → ripeti.</p>`},
 {h:"Code Smell (i 10 trattati)",src:"app,blue",html:`<p>Un <strong>code smell</strong> è un segnale di debolezza strutturale (non necessariamente un errore). I 10 trattati, in 5 categorie:</p>
 <table class="gt"><tr><th>Categoria</th><th>Code smell → refactoring tipico</th></tr>
 <tr><td><strong>Bloaters</strong></td><td>Long Method (Extract Method), Large Class (Extract Class/Subclass), Long Parameter List (Introduce Parameter Object, Preserve Whole Object)</td></tr>
 <tr><td><strong>OO Abusers</strong></td><td>Switch Statement (Replace Conditional with Polymorphism), Refused Bequest (Replace Inheritance with Delegation, Extract Superclass)</td></tr>
 <tr><td><strong>Change Preventers</strong></td><td>Shotgun Surgery (Move Method/Field, Inline Class)</td></tr>
 <tr><td><strong>Dispensables</strong></td><td>Duplicated Code (Extract Method), Data Class (Move Method), Comments (Extract Variable/Method, Rename, Introduce Assertion)</td></tr>
 <tr><td><strong>Couplers</strong></td><td>Feature Envy (Move Method)</td></tr></table>`},
 {h:"Tecniche di Refactoring",src:"blue",html:`<p>Tecniche con esempi prima/dopo (Blue): <strong>Extract Variable</strong>, <strong>Extract Method</strong>, <strong>Extract Class</strong>, <strong>Extract Subclass</strong>, <strong>Extract Superclass</strong>, <strong>Inline Class</strong>, <strong>Move Method</strong>, <strong>Move Field</strong>, <strong>Rename Method</strong>, <strong>Preserve Whole Object</strong>, <strong>Replace Temp with Query</strong>, <strong>Replace Method with Method Object</strong>, <strong>Replace Parameter with Method Call</strong>, <strong>Replace Conditional with Polymorphism</strong>, <strong>Replace Inheritance with Delegation</strong>, <strong>Decompose Conditional</strong>, <strong>Introduce Parameter Object</strong>, <strong>Introduce Assertion</strong>.</p>
 <pre><code>// Extract Method (prima)
void printOwing(){ printBanner();
  System.out.println("name: "+name);
  System.out.println("amount: "+getOutstanding()); }
// (dopo)
void printOwing(){ printBanner(); printDetails(getOutstanding()); }
void printDetails(double outstanding){
  System.out.println("name: "+name);
  System.out.println("amount: "+outstanding); }</code></pre>`}
]}
];
</script>

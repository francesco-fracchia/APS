<script>
APS.flash=[
{t:"Intro",s:"app,blue,sofia",q:"Quali sono le 4 caratteristiche di un buon software?",a:"Mantenibilità, Affidabilità (Fidatezza), Efficienza, Accettabilità."},
{t:"Intro",s:"app",q:"Differenza tra software generico e personalizzato?",a:"Generico: per un ampio insieme di clienti, specifiche di proprietà dello sviluppatore. Personalizzato (custom): per un singolo cliente, specifiche di proprietà del cliente."},
{t:"Intro",s:"app,sofia",q:"Cos'è l'ingegneria del software?",a:"Disciplina ingegneristica che si occupa di TUTTI gli aspetti della produzione di software di buona qualità, dalle prime specifiche fino alla manutenzione; include processo tecnico, gestione del progetto e sviluppo di strumenti di supporto."},
{t:"Intro",s:"app",q:"Cosa significano Analisi e Progettazione?",a:"Analisi = 'fare la cosa giusta' (indagare il problema e i requisiti). Progettazione = 'fare la cosa bene' (soluzione concettuale che soddisfa i requisiti). Sono distinte ma sinergiche e non sequenziali."},
{t:"Intro",s:"app",q:"Quali sono le 4 fasi di Analisi e Progettazione?",a:"1) Casi d'uso, 2) Modello di dominio, 3) Diagrammi di interazione, 4) Diagrammi delle classi."},
{t:"Intro",s:"app,blue,sofia",q:"Cos'è UML? È una metodologia?",a:"Linguaggio visuale di modellazione, standard de facto. NON è una metodologia (lo è UP). Modella struttura statica e dinamica; usabile come abbozzo, progetto o linguaggio di programmazione."},
{t:"Intro",s:"app,sofia",q:"I due punti di vista di UML?",a:"Concettuale (oggetti del mondo reale → Modello di Dominio, classi concettuali) e Software (componenti software → Modello di Progetto, classi software). Stessa notazione."},
{t:"Processi",s:"app,blue,sofia",q:"Cosa definisce un processo software?",a:"Chi (ruoli) fa cosa (attività), quando (organizzazione temporale) e come (metodologie). Descrive artefatti, ruoli, pre/post-condizioni."},
{t:"Processi",s:"app,sofia",q:"Perché il processo a cascata fallisce spesso?",a:"È inflessibile: la suddivisione in fasi sequenziali distinte rende difficile rispondere alle mutevoli esigenze del cliente. Adatto solo con requisiti ben definiti e stabili."},
{t:"Processi",s:"app,blue,sofia",q:"Cos'è lo sviluppo iterativo, incrementale ed evolutivo?",a:"Sviluppo in iterazioni timeboxed (2-6 settimane), ciascuna produce un eseguibile (anche parziale). Incrementale: cresce iterazione dopo iterazione. Evolutivo: il feedback di N raffina requisiti/progetto in N+1."},
{t:"Processi",s:"blue,sofia",q:"Cos'è il timeboxing?",a:"La durata di un'iterazione è fissa: in caso di problemi si adatta il carico di lavoro, non il tempo. Tipicamente 2-6 settimane."},
{t:"Processi",s:"app,blue,sofia",q:"Cos'è UP e da cosa è pilotato?",a:"Unified Process: processo iterativo, incrementale, evolutivo per lo sviluppo OO. Pilotato dai casi d'uso (requisiti) e dai rischi, incentrato sull'architettura. Tutto opzionale tranne il codice."},
{t:"Processi",s:"app,blue,sofia",q:"Quali sono le 4 fasi di UP?",a:"Ideazione, Elaborazione, Costruzione, Transizione."},
{t:"Processi",s:"blue,sofia",q:"Qual è la differenza tra fase e disciplina in UP?",a:"Le FASI (ideazione→elaborazione→costruzione→transizione) organizzano le iterazioni nel tempo. Le DISCIPLINE sono le attività svolte dentro l'iterazione (modellazione business, requisiti, progettazione, implementazione…)."},
{t:"Processi",s:"app",q:"Cosa sono Release e Incremento in UP?",a:"Release: insieme di manufatti previsti e approvati, prodotto da un'iterazione. Incremento: la differenza tra una release e la successiva."},
{t:"Processi",s:"app,blue,sofia",q:"Cos'è lo sviluppo agile / Agile Modeling?",a:"Sviluppo iterativo che incoraggia risposta rapida ai cambiamenti. Agile Modeling: modellare per COMPRENDERE e COMUNICARE (non documentare), solo le parti difficili, a coppie, sapendo che i modelli sono incompleti."},
{t:"Processi",s:"app,blue,sofia",q:"Cos'è Scrum? Cita sprint, velocity, backlog.",a:"Metodo agile per organizzazione/gestione progetti. Sprint = iterazione di 2-4 settimane. Velocity = lavoro fattibile in uno sprint. Product backlog = lista 'da fare'. Ruoli: ScrumMaster, Team (≤7), Product Owner."},
{t:"Ideazione",s:"app,blue,sofia",q:"Qual è lo scopo dell'ideazione?",a:"Stabilire una visione comune, stabilire se il progetto è fattibile, decidere se proseguire con un'indagine seria nell'elaborazione. Esplora ~10% dei requisiti funzionali. NON è la fase dei requisiti."},
{t:"Ideazione",s:"blue,sofia",q:"Nell'ideazione si fanno SSD e Contratti?",a:"No. Nell'ideazione si abbozza il Modello dei Casi d'uso (nomi della maggior parte, ~10-20% in dettaglio). SSD e Contratti si iniziano nell'elaborazione."},
{t:"Requisiti",s:"app,blue,sofia",q:"Cos'è un requisito e quali tipi esistono?",a:"Capacità o condizione a cui il sistema deve essere conforme. Funzionali (comportamentali → Casi d'uso) e Non Funzionali (proprietà del sistema → Specifiche supplementari). Il 34% dei fallimenti riguarda i requisiti."},
{t:"Requisiti",s:"sofia",q:"Cosa significa FURPS+?",a:"Functionality, Usability, Reliability, Performance, Supportability (Sostenibilità), +."},
{t:"Requisiti",s:"app,sofia",q:"DEVE vs DOVREBBE nei requisiti?",a:"DEVE per i requisiti obbligatori, DOVREBBE per quelli desiderabili. Niente gergo informatico, includere il razionale."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Cos'è un caso d'uso?",a:"Storia scritta in linguaggio naturale di un attore che usa un sistema per un obiettivo; collezione di scenari di successo e fallimento. Registra requisiti funzionali. NON è un diagramma, NON è OO."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Quali sono i tipi di attore?",a:"Primario (raggiunge obiettivi usando il SuD), Finale (vuole che il SuD venga usato per i suoi obiettivi), Di supporto (offre un servizio al SuD), Fuori scena (ha interesse ma non interviene)."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Cos'è uno scenario?",a:"Istanza del caso d'uso: sequenza specifica di azioni e interazioni tra sistema e attori; di successo o di fallimento."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Quali sono i formati dei casi d'uso?",a:"Breve (un paragrafo, scenario principale), Informale (più paragrafi), Dettagliato (tutti i passi e le variazioni, 3-10 pagine, con sezioni di supporto)."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Quali sono i 3 test di utilità di un caso d'uso?",a:"Test del capo (valore misurabile), Test EBP (5-10 passi, una sessione, evento di business, valore osservabile, stato stabile), Test della dimensione (non troppo breve, 3-10 pagine)."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"I 4 passi per trovare i casi d'uso?",a:"1) Scegliere il confine di sistema, 2) identificare gli attori primari, 3) identificare gli obiettivi di ogni attore, 4) definire i casi d'uso che li soddisfano. CRUD → 'Gestisci X'."},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Le 3 relazioni nel diagramma dei casi d'uso?",a:"Include (sempre e completamente eseguito nel base), Extend (variante eseguita se la condizione è vera, in un extension point), Generalizzazione (il figlio eredita/aggiunge/sovrascrive; anche tra attori)."},
{t:"Casi d'uso",s:"app,sofia",q:"Cosa significa scrivere a 'scatola nera' e in 'stile essenziale'?",a:"Scatola nera: specificare COSA fa il sistema (responsabilità), non COME. Stile essenziale: ignorare la UI e concentrarsi sullo scopo dell'attore (vs stile concreto con dettagli di interfaccia)."},
{t:"Dominio",s:"app,blue,sofia",q:"Cos'è il modello di dominio?",a:"Il modello più importante dell'Analisi OO: rappresentazione visuale di classi concettuali (NON software) e loro relazioni — un 'dizionario visuale'. Mostra classi concettuali, associazioni, attributi; nessuna operazione."},
{t:"Dominio",s:"app,sofia",q:"Il modello di dominio mostra oggetti software?",a:"No. Non mostra elementi software, metodi o responsabilità. Diverso dal modello dei dati (che mostra dati persistenti)."},
{t:"Dominio",s:"app,blue,sofia",q:"Come si considera una classe concettuale?",a:"In termini di Simbolo (parola/immagine), Intensione (definizione in linguaggio naturale) ed Estensione (insieme degli oggetti descritti)."},
{t:"Dominio",s:"app,sofia",q:"Le 3 strategie per trovare le classi concettuali?",a:"1) Riusare/modificare modelli esistenti, 2) usare un elenco di categorie comuni, 3) identificare nomi e locuzioni nominali."},
{t:"Dominio",s:"app,blue,sofia",q:"Differenza tra aggregazione e composizione?",a:"Aggregazione (rombo vuoto): legame debole tutto-parte, la parte può esistere indipendentemente e può essere condivisa. Composizione (rombo pieno): legame forte, la parte appartiene a un solo composto e dipende da esso; il composto crea/cancella le parti."},
{t:"Dominio",s:"app,blue,sofia",q:"Si possono usare attributi come chiavi esterne?",a:"No. I tipi si correlano con le ASSOCIAZIONI, non con gli attributi. Gli attributi sono proprietà elementari (tipi di dato)."},
{t:"Dominio",s:"blue,sofia",q:"Cos'è il basso salto rappresentazionale (LRG)?",a:"Usare nomi delle classi software ispirati al modello di dominio, così che il modello mentale del dominio corrisponda direttamente agli oggetti software → facilità di comprensione."},
{t:"SSD",s:"app,blue,sofia",q:"Cos'è un SSD?",a:"Diagramma di Sequenza di Sistema: mostra, per uno scenario di un caso d'uso, gli eventi di input/output tra attori esterni e il sistema, considerato a scatola nera."},
{t:"SSD",s:"app,sofia",q:"Evento di sistema vs operazione di sistema?",a:"Evento di sistema: evento esterno di input generato da un attore. Operazione di sistema: trasformazione/interrogazione che il sistema esegue per gestire l'evento. L'insieme delle operazioni di sistema è l'interfaccia di sistema pubblica."},
{t:"SSD",s:"app,sofia",q:"A quali 3 tipi di eventi reagisce un sistema?",a:"Eventi esterni da attori, eventi temporali, guasti/eccezioni. Negli SSD ci si occupa principalmente dei primi."},
{t:"Contratti",s:"app,blue,sofia",q:"Cosa descrivono i contratti delle operazioni?",a:"I cambiamenti agli oggetti del modello di dominio causati da un'operazione di sistema, tramite pre-condizioni e (soprattutto) post-condizioni."},
{t:"Contratti",s:"app,blue,sofia",q:"Cosa sono le post-condizioni e come si scrivono?",a:"La sezione più importante del contratto: osservazioni sullo stato degli oggetti DOPO l'operazione (non azioni), al passato e in forma passiva. 3 categorie: creazione/cancellazione istanza, modifica attributo, formazione/rottura collegamento."},
{t:"Contratti",s:"sofia",q:"Qual è l'analogia del palcoscenico per le post-condizioni?",a:"Foto prima → si chiude il sipario e si applica l'operazione → foto dopo. Le post-condizioni esprimono le differenze osservate tra le due foto."},
{t:"Architettura",s:"app,blue,sofia",q:"Cos'è l'architettura logica?",a:"Organizzazione su larga scala delle classi software in package/strati/sottoinsiemi. 'Logica' perché non decide la distribuzione fisica (deployment). Si illustra con un diagramma dei package UML."},
{t:"Architettura",s:"app,blue,sofia",q:"Differenza tra architettura a strati stretta e rilassata?",a:"Stretta: uno strato può chiamare solo i servizi dello strato immediatamente sottostante. Rilassata: uno strato alto può chiamare servizi di strati più bassi di diversi livelli (comune nei sistemi informatici)."},
{t:"Architettura",s:"app,sofia",q:"Cos'è il principio di separazione Modello-Vista?",a:"Gli oggetti di dominio (modello) non devono essere accoppiati direttamente agli oggetti UI (vista). Gli oggetti UI delegano la logica agli oggetti di dominio. Rilassamento legittimo: il pattern Observer."},
{t:"Architettura",s:"app,blue,sofia",q:"Tier, Layer e Partition?",a:"Tier (livello): nodo fisico di elaborazione. Layer (strato): sezione verticale dell'architettura. Partition (partizione): divisione orizzontale di sottosistemi di uno strato."},
{t:"Interazione",s:"app,blue,sofia",q:"Modelli statici vs dinamici?",a:"Statici (diagrammi delle classi, package, deployment): struttura. Dinamici (sequenza, comunicazione, stati, attività): comportamento; qui si applicano RDD e GRASP. Da creare in parallelo."},
{t:"Interazione",s:"app,blue,sofia",q:"Sequenza vs Comunicazione: differenza principale?",a:"SD enfatizza la sequenza temporale (formato a steccato, verticale). CD enfatizza le relazioni strutturali (formato a grafo/rete, messaggi numerati). Stesse interazioni, diversa enfasi."},
{t:"Interazione",s:"app,blue,sofia",q:"Messaggio sincrono vs asincrono in un SD?",a:"Sincrono: freccia con punta piena (il mittente attende). Asincrono: freccia con punta vuota (il mittente continua senza attendere)."},
{t:"Interazione",s:"app,sofia",q:"Cosa fanno i frammenti combinati opt, alt, loop?",a:"opt: operando eseguito se la condizione è vera (if). alt: eseguito l'operando con condizione vera (switch/[else]). loop: ripetuto finché la guardia è vera (loop min,max [cond])."},
{t:"Classi",s:"app,blue,sofia",q:"I simboli di visibilità in UML?",a:"+ pubblica, - privata (default), # protetta (classe e sottoclassi), ~ package (stesso package)."},
{t:"Classi",s:"app,sofia",q:"Operazione vs metodo in UML?",a:"Operazione: dichiarazione (nome, parametri, tipo ritorno, vincoli) — una specifica/astrazione. Metodo: l'implementazione dell'operazione."},
{t:"Classi",s:"app,sofia",q:"Vincoli di generalizzazione e default?",a:"{disjoint}/{overlapping} (istanze comuni o no) e {complete}/{incomplete} (l'unione delle sottoclassi copre la superclasse o no). Default: {overlapping, incomplete}."},
{t:"Classi",s:"app,blue,sofia",q:"Notazione lollipop e socket per le interfacce?",a:"Lollipop (cerchio/pallino): interfaccia FORNITA (la classe la implementa). Socket (semicerchio): interfaccia RICHIESTA (la classe la usa). Si connettono con il connettore di assemblaggio."},
{t:"Classi",s:"app,blue,sofia",q:"Cos'è un profilo UML?",a:"Insieme di Stereotipi (nuovo elemento basato su uno esistente), Tagged Values/Tag (info aggiuntive) e Vincoli, usato per personalizzare UML per un uso specifico."},
{t:"Stati",s:"app,blue,sofia",q:"Cosa modellano le macchine a stati?",a:"Il comportamento dinamico di un classificatore: il ciclo di vita di un oggetto in termini di stati, transizioni ed eventi. Utili per oggetti dipendenti dallo stato o per protocolli."},
{t:"Stati",s:"app,blue,sofia",q:"Azione vs attività in una macchina a stati?",a:"Azione: istantanea e non interrompibile. Attività: richiede un tempo finito ed è interrompibile (ciò che l'oggetto fa mentre è nello stato)."},
{t:"Stati",s:"app,blue,sofia",q:"Quali tipi di eventi esistono?",a:"Di chiamata (richiama un'operazione), di segnale (pacchetto asincrono), di variazione (condizione booleana da falso a vero), temporale (dopo/quando)."},
{t:"Stati",s:"blue,sofia",q:"Memoria semplice (H) vs multilivello (H*)?",a:"H: ricorda l'ultimo sottostato attivo al rientro. H*: ricorda anche i sotto-sottostati annidati."},
{t:"Stati",s:"blue,sofia",q:"Stati compositi semplici vs ortogonali?",a:"Semplici: una sola regione. Ortogonali: più regioni con sotto-macchine in parallelo. Uscita sincrona (tutte terminano) o asincrona (una termina)."},
{t:"Attività",s:"app,blue,sofia",q:"Cos'è il token game?",a:"Un token (oggetto/dati/controllo) si sposta tra nodi. Un nodo azione esegue un AND logico sui token in entrata (parte quando c'è un token su ogni arco entrante) e una fork implicita sugli archi uscenti."},
{t:"Attività",s:"app,sofia",q:"Differenza tra nodo decisione e nodo biforcazione?",a:"Decisione: un arco entrante, più uscenti alternativi con guardie mutuamente esclusive (uno solo passa). Biforcazione: divide il flusso in più flussi CONCORRENTI (duplica il token su tutti gli uscenti)."},
{t:"Attività",s:"app",q:"Cos'è un Pin?",a:"Un nodo oggetto che rappresenta un input in un'azione o un output da un'azione."},
{t:"GRASP",s:"app,blue,sofia",q:"Cos'è la RDD?",a:"Responsibility-Driven Design: considera il progetto OO come una comunità di oggetti con responsabilità (di fare / di conoscere) che collaborano. Responsabilità ≠ metodo: i metodi implementano le responsabilità."},
{t:"GRASP",s:"app,blue,sofia",q:"Quanti e quali sono i pattern GRASP?",a:"9: Creator, Information Expert, Low Coupling, Controller, High Cohesion, Pure Fabrication, Polymorphism, Indirection, Protected Variations."},
{t:"GRASP",s:"app,blue,sofia",q:"Creator: problema e soluzione.",a:"Chi crea A? Assegna a B se B contiene/aggrega (composizione), registra, usa strettamente A, o ha i dati per inizializzarlo. Es: Sale crea SalesLineItem; Board crea Square."},
{t:"GRASP",s:"app,blue,sofia",q:"Information Expert: problema e soluzione.",a:"A quale oggetto assegnare una responsabilità? A chi possiede le informazioni necessarie per soddisfarla. Es: Sale calcola il proprio totale."},
{t:"GRASP",s:"app,blue,sofia",q:"Low Coupling: problema e soluzione.",a:"Come ridurre l'impatto dei cambiamenti? Assegnare le responsabilità in modo che l'accoppiamento (non necessario) rimanga basso. Pattern correlato: Protected Variations."},
{t:"GRASP",s:"app,blue,sofia",q:"Controller: cos'è e quali tipi?",a:"Primo oggetto oltre la UI che riceve e coordina un'operazione di sistema. Tipi: facade controller (sistema/radice/sottosistema) e use-case controller (scenario di caso d'uso, è una Pure Fabrication). È un pattern di delega."},
{t:"GRASP",s:"app,blue,sofia",q:"Cos'è un controller gonfio?",a:"Controller con coesione bassa: gestisce troppe operazioni, fa lavoro prima di delegare, conserva troppe informazioni. Soluzioni: aggiungere controller, delegare al dominio."},
{t:"GRASP",s:"app,blue,sofia",q:"High Cohesion: i livelli di coesione.",a:"Molto bassa (molte cose in aree diverse), Bassa (un compito complesso in una sola area), Moderata (responsabilità leggere in poche aree correlate), Alta (responsabilità moderate in un'unica area, collabora)."},
{t:"GRASP",s:"app,blue,sofia",q:"Pure Fabrication: quando usarlo?",a:"Quando Expert violerebbe High Cohesion/Low Coupling: si assegna la responsabilità a una classe artificiale (di convenienza), non del dominio, per sostenere coesione alta, accoppiamento basso e riuso."},
{t:"GRASP",s:"app,blue,sofia",q:"Protected Variations: problema e soluzione.",a:"Come evitare che le variazioni/instabilità si propaghino? Identificare i punti di variazione previsti e creare un'interfaccia stabile attorno a essi. Motiva incapsulamento, interfacce, polimorfismo, indirezioni."},
{t:"GoF",s:"app,blue,sofia",q:"Quanti GoF si trattano nel corso e quali?",a:"7 dei 23: Adapter, Factory, Singleton, Strategy, Composite, Facade, Observer."},
{t:"GoF",s:"app,sofia",q:"Le 3 categorie dei GoF per scopo?",a:"Creazionali (creazione di oggetti), Strutturali (composizione di classi/oggetti), Comportamentali (interazione/comportamento)."},
{t:"GoF",s:"app,blue,sofia",q:"Adapter: problema e soluzione.",a:"Interfacce incompatibili (o componenti simili con interfacce diverse): un oggetto adattatore intermedio converte l'interfaccia originale in quella attesa. Adapter classe (ereditarietà) / oggetto (composizione)."},
{t:"GoF",s:"app,blue,sofia",q:"Factory: problema e soluzione.",a:"Creazione complessa o da separare: si crea un oggetto Pure Fabrication 'Factory' che gestisce la creazione. I metodi factory ritornano interfacce. Spesso è un Singleton."},
{t:"GoF",s:"app,blue,sofia",q:"Singleton: come si riconosce in codice?",a:"Attributo privato statico 'instance', costruttore privato, metodo pubblico statico getInstance() senza parametri. Lazy (creato alla prima richiesta, con synchronized) o non-lazy."},
{t:"GoF",s:"app,blue,sofia",q:"Strategy: problema e soluzione.",a:"Gestire algoritmi/politiche variabili ma correlati: definire ciascuno in una classe separata con un'interfaccia comune; il Context delega all'oggetto strategia. Usa Polymorphism, fornisce Protected Variations."},
{t:"GoF",s:"app,blue,sofia",q:"Composite: problema e soluzione.",a:"Trattare un gruppo composto di oggetti come un singolo oggetto atomico: oggetti composti e foglie implementano la stessa interfaccia (Component). Il composto contiene una lista di Component."},
{t:"GoF",s:"app,blue,sofia",q:"Facade: problema e soluzione.",a:"Semplificare l'accesso a un sottosistema complesso: un oggetto facciata, punto di contatto unico, che incapsula e coordina i componenti interni. Spesso un Singleton; fornisce Protected Variations e Indirection."},
{t:"GoF",s:"app,blue,sofia",q:"Observer: problema e soluzione.",a:"Notificare più subscriber al cambio di stato di un publisher mantenendo accoppiamento basso: si definisce un'interfaccia listener; i subscriber si registrano dinamicamente e il publisher li avvisa. Rispetta Modello-Vista."},
{t:"Visibilità",s:"app,blue,sofia",q:"Quali sono i 4 modi di ottenere visibilità?",a:"Per attributo (permanente), per parametro (temporanea), locale (temporanea), globale (permanente; in Java via Singleton)."},
{t:"TDD",s:"app,blue,sofia",q:"Qual è il ciclo del TDD?",a:"1) Scrivi un test che fallisce per una funzione non esistente, 2) scrivi il codice minimo per farlo passare, 3) rifattorizza mantenendo il test verde."},
{t:"TDD",s:"app,blue,sofia",q:"Quali sono i tipi di test?",a:"Di unità (singole classi/metodi), di integrazione (collaborazioni), di sistema (end-to-end), di accettazione (validazione con il cliente)."},
{t:"TDD",s:"app,blue,sofia",q:"Schema di un test unitario?",a:"Preparazione (crea la fixture) → Esecuzione → Verifica (confronta col valore atteso) → Rilascio (opzionale). Framework: xUnit / JUnit."},
{t:"Refactoring",s:"app,blue,sofia",q:"Cos'è il refactoring?",a:"Riscrivere/riorganizzare codice esistente SENZA modificarne il comportamento esterno, con piccoli passi e test continui dopo ogni modifica."},
{t:"Refactoring",s:"blue",q:"Il refactoring corregge i bug? Quando si fa?",a:"NO, il refactoring non corregge i bug. Si fa: Regola del Tre (codice riusato ≥3 volte), quando si aggiunge una funzionalità, quando si corregge un bug, durante la revisione del codice."},
{t:"Refactoring",s:"app,blue",q:"Cos'è un code smell e cita le 5 categorie.",a:"Segnale di debolezza strutturale (non un errore). Categorie: Bloaters, OO Abusers, Change Preventers, Dispensables, Couplers."},
{t:"Refactoring",s:"app,blue",q:"Quale refactoring per uno Switch Statement / lungo condizionale per tipo?",a:"Replace Conditional with Polymorphism (dividere i casi su sottoclassi diverse e usare il polimorfismo)."}
];
</script>
<!-- ============================ DATA: QUIZ ============================ -->
<script>
APS.quiz=[
{tp:"mc",t:"Intro",s:"app",q:"Quale coppia descrive correttamente Analisi e Progettazione?",o:["Analisi = fare la cosa bene; Progettazione = fare la cosa giusta","Analisi = fare la cosa giusta; Progettazione = fare la cosa bene","Sono sinonimi","Analisi = scrivere codice; Progettazione = testare"],c:1,e:"Analisi = 'fare la cosa giusta' (indagare problema e requisiti); Progettazione = 'fare la cosa bene' (soluzione che soddisfa i requisiti)."},
{tp:"vf",t:"Intro",s:"app,blue,sofia",q:"UML è una metodologia di sviluppo.",c:false,e:"Falso: UML è un LINGUAGGIO visuale di modellazione, non una metodologia. UP invece è una metodologia/processo."},
{tp:"mc",t:"Intro",s:"app",q:"Quali sono le 4 caratteristiche di un buon software?",o:["Velocità, Costo, Sicurezza, Design","Mantenibilità, Affidabilità, Efficienza, Accettabilità","Portabilità, Riuso, Test, Documentazione","Coesione, Accoppiamento, Modularità, Scalabilità"],c:1,e:"Mantenibilità, Affidabilità (Fidatezza), Efficienza, Accettabilità."},
{tp:"vf",t:"Intro",s:"app",q:"Il modello di dominio contiene classi software con metodi.",c:false,e:"Falso: contiene classi CONCETTUALI, senza operazioni/metodi; non rappresenta oggetti software."},
{tp:"mc",t:"Processi",s:"app,blue,sofia",q:"UP è pilotato da…",o:["dalla documentazione e dai diagrammi","dai casi d'uso (requisiti) e dai rischi, incentrato sull'architettura","dal piano dettagliato iniziale","dal codice già scritto"],c:1,e:"UP è pilotato dai casi d'uso e dai rischi ed è incentrato sull'architettura."},
{tp:"mc",t:"Processi",s:"app",q:"Le 4 fasi di UP, nell'ordine, sono:",o:["Requisiti, Analisi, Progettazione, Test","Ideazione, Elaborazione, Costruzione, Transizione","Sprint, Backlog, Release, Deploy","Cascata, Iterazione, Incremento, Evoluzione"],c:1,e:"Ideazione → Elaborazione → Costruzione → Transizione."},
{tp:"vf",t:"Processi",s:"blue,sofia",q:"In UP, fase e disciplina sono la stessa cosa.",c:false,e:"Falso: le FASI (4) organizzano le iterazioni nel tempo; le DISCIPLINE sono le attività svolte dentro l'iterazione (requisiti, progettazione…)."},
{tp:"vf",t:"Processi",s:"app",q:"In UP quasi tutto è opzionale, tranne il codice.",c:true,e:"Vero: alcune pratiche sono fisse (sviluppo iterativo guidato dal rischio, verifica continua della qualità), ma tutti gli elaborati sono opzionali tranne il codice."},
{tp:"mc",t:"Processi",s:"blue,sofia",q:"In Scrum, uno 'sprint' è:",o:["un incontro giornaliero","un'iterazione di sviluppo (2-4 settimane)","la lista delle cose da fare","il ruolo del project manager"],c:1,e:"Lo sprint è un'iterazione di sviluppo, di solito 2-4 settimane. L'incontro giornaliero è lo 'scrum'; la lista è il product backlog."},
{tp:"mc",t:"Processi",s:"blue,sofia",q:"Cosa indica il timeboxing?",o:["La durata è variabile, il carico fisso","La durata è fissa, si adatta il carico di lavoro","Si pianifica tutto all'inizio","Iterazioni di almeno 3 mesi"],c:1,e:"Timeboxing: durata dell'iterazione fissa; in caso di problemi si adatta il carico di lavoro, non il tempo."},
{tp:"vf",t:"Ideazione",s:"blue,sofia",q:"Nell'iterazione zero (ideazione) si produce software eseguibile destinato al prodotto finale.",c:false,e:"Falso: l'ideazione (iterazione 0) non punta a produrre software eseguibile; eventuali prototipi non fanno parte del prodotto finale."},
{tp:"vf",t:"Ideazione",s:"blue,sofia",q:"SSD e Contratti vengono creati durante l'ideazione.",c:false,e:"Falso: nell'ideazione si abbozza il Modello dei Casi d'uso; SSD e Contratti si iniziano nell'elaborazione."},
{tp:"mc",t:"Requisiti",s:"sofia",q:"Cosa rappresenta la 'U' di FURPS+?",o:["Unit testing","Usability (usabilità)","Uniformity","Use case"],c:1,e:"FURPS+: Functionality, Usability, Reliability, Performance, Supportability, +."},
{tp:"mc",t:"Requisiti",s:"app,sofia",q:"Nei requisiti si usa 'DEVE' per…",o:["i requisiti desiderabili","i requisiti obbligatori","i requisiti non funzionali","gli obiettivi"],c:1,e:"DEVE = obbligatorio; DOVREBBE = desiderabile."},
{tp:"mc",t:"Casi d'uso",s:"app,blue,sofia",q:"Un caso d'uso è…",o:["un diagramma UML orientato agli oggetti","una storia scritta, collezione di scenari, non OO","un'operazione di sistema","una classe del modello di dominio"],c:1,e:"È una storia scritta in linguaggio naturale, collezione di scenari di successo/fallimento; non è un diagramma né è OO."},
{tp:"mc",t:"Casi d'uso",s:"app,blue,sofia",q:"Quale attore 'offre un servizio al SuD'?",o:["Primario","Finale","Di supporto","Fuori scena"],c:2,e:"L'attore di supporto offre un servizio al SuD (es. servizio di autorizzazione pagamenti)."},
{tp:"vf",t:"Casi d'uso",s:"app,sofia",q:"Il 'test del capo' verifica che un caso d'uso porti un risultato di valore misurabile.",c:true,e:"Vero: se la risposta a 'cosa hai fatto tutto il giorno?' (es. 'il login!') non soddisfa il capo, il caso d'uso non mira a un valore misurabile."},
{tp:"mc",t:"Casi d'uso",s:"app,blue,sofia",q:"La relazione 'Include' tra casi d'uso indica…",o:["una variante eseguita solo se una condizione è vera","un caso d'uso eseguito sempre e completamente nel caso base","un'ereditarietà tra attori","una dipendenza tra package"],c:1,e:"Include: il caso d'uso incluso è eseguito sempre e completamente; il base senza di esso è incompleto. La variante condizionale è invece Extend."},
{tp:"vf",t:"Casi d'uso",s:"app,sofia",q:"I casi d'uso vanno scritti a 'scatola nera'.",c:true,e:"Vero: specificano COSA fa il sistema (responsabilità), non COME (che è progettazione)."},
{tp:"mc",t:"Dominio",s:"app,blue,sofia",q:"La composizione (rombo pieno) implica che…",o:["la parte può essere condivisa da più composti","la parte appartiene a un solo composto e dipende da esso","la parte esiste sempre indipendentemente","non c'è responsabilità di creazione/cancellazione"],c:1,e:"Composizione: legame forte; la parte appartiene a UN solo composto, che è responsabile di crearla/cancellarla."},
{tp:"vf",t:"Dominio",s:"app,blue,sofia",q:"È corretto usare gli attributi come chiavi esterne per correlare classi concettuali.",c:false,e:"Falso: i tipi si correlano con ASSOCIAZIONI, non con attributi chiave esterna."},
{tp:"mc",t:"Dominio",s:"app",q:"Una classe concettuale si considera in termini di:",o:["pubblica, privata, protetta","simbolo, intensione, estensione","identità, stato, comportamento","nome, attributi, operazioni"],c:1,e:"Simbolo (parola/immagine), Intensione (definizione), Estensione (insieme degli oggetti)."},
{tp:"mc",t:"SSD",s:"app,sofia",q:"In un SSD il sistema è rappresentato come…",o:["un insieme di oggetti di dominio","una scatola nera","un controller","una classe astratta"],c:1,e:"Nell'SSD il sistema è una scatola nera: interessano solo gli eventi di input/output con gli attori."},
{tp:"vf",t:"Contratti",s:"app,blue,sofia",q:"Le post-condizioni descrivono le azioni eseguite durante l'operazione.",c:false,e:"Falso: sono OSSERVAZIONI sullo stato degli oggetti DOPO l'operazione (al passato e in forma passiva), non azioni."},
{tp:"mc",t:"Contratti",s:"app,blue,sofia",q:"Quale NON è una categoria di post-condizione?",o:["Creazione/cancellazione di istanza","Modifica di valore di attributo","Formazione/rottura di collegamento","Invio di un messaggio sincrono"],c:3,e:"Le 3 categorie sono: creazione/cancellazione istanza, modifica attributo, formazione/rottura collegamento."},
{tp:"mc",t:"Architettura",s:"app,blue,sofia",q:"In un'architettura a strati 'rilassata'…",o:["uno strato chiama solo quello immediatamente sottostante","uno strato alto può chiamare strati più bassi di diversi livelli","gli strati bassi chiamano quelli alti","non esistono dipendenze tra strati"],c:1,e:"Rilassata: uno strato alto può chiamare servizi di strati più bassi di diversi livelli (comune nei sistemi informatici)."},
{tp:"vf",t:"Architettura",s:"app,sofia",q:"Il pattern Observer è un rilassamento legittimo del principio Modello-Vista.",c:true,e:"Vero: con Observer gli oggetti di dominio comunicano con la UI indirettamente tramite un'interfaccia (es. PropertyListener), senza conoscerne la classe concreta."},
{tp:"mc",t:"Architettura",s:"app,blue,sofia",q:"Cosa indica 'Layer' (strato)?",o:["un nodo fisico di elaborazione","una sezione verticale dell'architettura","una divisione orizzontale di sottosistemi","un package di terze parti"],c:1,e:"Layer = sezione verticale. Tier = nodo fisico. Partition = divisione orizzontale di sottosistemi di uno strato."},
{tp:"mc",t:"Interazione",s:"app,blue,sofia",q:"Un messaggio asincrono in un SD si rappresenta con…",o:["una freccia con punta piena","una freccia con punta vuota","una linea tratteggiata","una X grande"],c:1,e:"Asincrono = punta vuota; sincrono = punta piena; create = tratteggiata con punta piena; destroy = X grande."},
{tp:"mc",t:"Interazione",s:"app,sofia",q:"Il frammento combinato 'loop' serve a…",o:["eseguire un operando se la condizione è vera","ripetere un operando finché la guardia è vera","riferirsi a un'altra interazione","interrompere l'interazione"],c:1,e:"loop: ripetizione (loop min,max [cond]). opt=if, ref=riferimento, break=interruzione."},
{tp:"mc",t:"Classi",s:"app,blue,sofia",q:"Il simbolo '#' indica visibilità…",o:["pubblica","privata","protetta","package"],c:2,e:"# = protetta (accessibile dalla classe e dalle sottoclassi). + pubblica, - privata, ~ package."},
{tp:"vf",t:"Classi",s:"app,sofia",q:"Il default dei vincoli di generalizzazione è {disjoint, complete}.",c:false,e:"Falso: il default è {overlapping, incomplete}."},
{tp:"mc",t:"Classi",s:"app,blue,sofia",q:"La notazione 'lollipop' (cerchio) indica un'interfaccia…",o:["richiesta","fornita (implementata)","astratta","privata"],c:1,e:"Lollipop = interfaccia FORNITA (implementata). Socket (semicerchio) = interfaccia RICHIESTA."},
{tp:"mc",t:"Stati",s:"app,blue,sofia",q:"In una macchina a stati, un'azione è…",o:["interrompibile e dura nel tempo","istantanea e non interrompibile","un evento esterno","uno pseudostato"],c:1,e:"Azione = istantanea e non interrompibile. Attività = dura un tempo finito ed è interrompibile."},
{tp:"mc",t:"Stati",s:"blue,sofia",q:"Lo pseudostato con memoria multilivello si indica con…",o:["H","H*","una croce","un diamante"],c:1,e:"H* = memoria multilivello (ricorda anche i sotto-sottostati). H = memoria semplice."},
{tp:"mc",t:"Attività",s:"app,sofia",q:"Un nodo biforcazione (fork)…",o:["sceglie un solo ramo in base alle guardie","divide il flusso in più flussi concorrenti","unisce flussi alternativi","termina l'attività"],c:1,e:"La biforcazione divide il flusso in più flussi CONCORRENTI. Il nodo decisione invece sceglie un solo ramo."},
{tp:"vf",t:"Attività",s:"app",q:"Un nodo azione esegue un AND logico sui token in entrata.",c:true,e:"Vero: parte quando c'è un token su ogni arco entrante (AND), poi fa una fork implicita su tutti gli archi uscenti."},
{tp:"mc",t:"GRASP",s:"app,blue,sofia",q:"Quanti sono i pattern GRASP trattati?",o:["5","7","9","23"],c:2,e:"9: Creator, Information Expert, Low Coupling, Controller, High Cohesion, Pure Fabrication, Polymorphism, Indirection, Protected Variations."},
{tp:"mc",t:"GRASP",s:"app,blue,sofia",q:"Information Expert assegna la responsabilità a…",o:["chi crea l'oggetto","chi possiede le informazioni necessarie","un oggetto controller","una classe artificiale"],c:1,e:"Information Expert: assegna la responsabilità all'oggetto che possiede le informazioni per soddisfarla."},
{tp:"mc",t:"GRASP",s:"app,blue,sofia",q:"Il Controller è…",o:["l'oggetto che esegue tutto il lavoro di un'operazione","il primo oggetto oltre la UI che riceve e coordina un'operazione di sistema","un oggetto del modello di dominio con i dati","un'interfaccia stabile"],c:1,e:"Il Controller è il primo oggetto oltre lo strato UI che riceve e coordina (delega) un'operazione di sistema."},
{tp:"vf",t:"GRASP",s:"app,blue,sofia",q:"Una Pure Fabrication rappresenta un concetto del dominio del problema.",c:false,e:"Falso: è una classe ARTIFICIALE (di convenienza), inventata per sostenere coesione alta, basso accoppiamento e riuso; non è del dominio."},
{tp:"mc",t:"GRASP",s:"app,blue,sofia",q:"Protected Variations consiste nel…",o:["creare quante più interfacce possibili","creare un'interfaccia stabile attorno ai punti di variazione previsti","evitare il polimorfismo","accoppiare fortemente i componenti"],c:1,e:"Si identificano i punti di variazione previsti e si crea un'interfaccia stabile attorno a essi. Non va usato per variazioni improbabili."},
{tp:"mc",t:"GoF",s:"app,blue,sofia",q:"Quanti GoF si trattano nel corso?",o:["7 dei 23","tutti e 23","circa 15","9"],c:0,e:"Si trattano 7 dei 23 GoF: Adapter, Factory, Singleton, Strategy, Composite, Facade, Observer."},
{tp:"mc",t:"GoF",s:"app,blue,sofia",q:"Quale pattern usa un metodo statico getInstance() e costruttore privato?",o:["Factory","Singleton","Adapter","Facade"],c:1,e:"Singleton: garantisce una sola istanza con accesso globale tramite getInstance() statico e costruttore privato."},
{tp:"mc",t:"GoF",s:"app,blue,sofia",q:"L'Adapter risolve il problema di…",o:["una sola istanza globale","interfacce incompatibili","notificare più osservatori","semplificare un sottosistema"],c:1,e:"Adapter: converte l'interfaccia originale di un componente in un'altra attesa dal client (interfacce incompatibili)."},
{tp:"vf",t:"GoF",s:"app,blue,sofia",q:"Strategy si basa sul polimorfismo e fornisce Protected Variations.",c:true,e:"Vero: definisce algoritmi intercambiabili dietro un'interfaccia comune; usa Polymorphism e fornisce Protected Variations rispetto agli algoritmi variabili."},
{tp:"mc",t:"GoF",s:"app,blue,sofia",q:"Il Composite permette di…",o:["creare oggetti complessi","trattare oggetti composti e atomici nello stesso modo","convertire interfacce","garantire una sola istanza"],c:1,e:"Composite: oggetti composti e foglie implementano la stessa interfaccia (Component), trattati uniformemente."},
{tp:"mc",t:"GoF",s:"app,sofia",q:"L'Observer è preferibile rispetto a soluzioni…",o:["di ereditarietà multipla","pull o polling","di composizione","di delegazione"],c:1,e:"Observer evita pull (la GUI interroga) e polling (interroga periodicamente): il publisher notifica i subscriber registrati."},
{tp:"mc",t:"Visibilità",s:"app,blue,sofia",q:"Quale tipo di visibilità è 'permanente'?",o:["per parametro","locale","per attributo","nessuna"],c:2,e:"Per attributo e globale sono permanenti; per parametro e locale sono temporanee (durano nell'ambito del metodo)."},
{tp:"vf",t:"TDD",s:"app,blue,sofia",q:"Nel TDD si scrive prima il codice e poi il test.",c:false,e:"Falso: prima si scrive un test che FALLISCE, poi il codice minimo per farlo passare, infine si rifattorizza."},

APS.links=[
{q:"Come si collegano Casi d'uso, SSD, Contratti e Diagrammi di Interazione?",a:"I testi dei casi d'uso e gli eventi che implicano sono l'input per gli SSD. Le operazioni di sistema mostrate negli SSD diventano i messaggi iniziali (verso il Controller) dei diagrammi di interazione; i Contratti dettagliano (con le post-condizioni) i cambiamenti da ottenere. Catena: Casi d'uso → SSD → Contratti → Diagrammi di interazione → DCD → codice.",s:"app,blue,sofia"},
{q:"Che relazione c'è tra Modello di Dominio e Modello di Progetto?",a:"Sono due modelli SEPARATI. Il modello di dominio (classi concettuali) è una FONTE D'ISPIRAZIONE per i nomi delle classi software dello strato di dominio (basso salto rappresentazionale), ma non un vincolo: in progettazione si possono scoprire nuove classi o crearne senza corrispondenza concettuale.",s:"app,blue,sofia"},
{q:"Come si collega il diagramma di interazione (dinamico) con il diagramma delle classi (statico)?",a:"Si creano in PARALLELO. I messaggi nei diagrammi di interazione diventano operazioni nelle classi; le classi identificate nelle interazioni vengono dichiarate nel DCD. Quello che si rappresenta a livello dinamico va riportato a livello statico.",s:"blue,sofia"},
{q:"In quale fase/disciplina si usa ciascun diagramma?",a:"Modello di dominio: disciplina Modellazione del business (elaborazione). Casi d'uso/SSD/Contratti: disciplina Requisiti. Diagrammi di interazione, delle classi, dei package: disciplina Progettazione (Modello di Progetto). Macchine a stati e attività: opzionali, dove utili. L'ideazione abbozza i casi d'uso; l'elaborazione produce la maggior parte degli elaborati.",s:"app,blue,sofia"},
{q:"Come si collega l'SSD con lo strato di architettura?",a:"Gli eventi/operazioni di sistema mostrati nell'SSD sono catturati dallo strato UI; per il principio Modello-Vista, la UI delega allo strato del dominio. I messaggi mostrati negli SSD sono proprio i messaggi inviati dalla UI al dominio (al Controller).",s:"sofia"},
{q:"Che relazione c'è tra GRASP e GoF?",a:"Molti design pattern GoF si analizzano come SPECIALIZZAZIONI di principi GRASP. Es: Adapter = Indirection + Pure Fabrication che usa Polymorphism, e sostiene Protected Variations. Strategy, Composite, Observer, Facade si basano su Polymorphism e forniscono Protected Variations. Low Coupling, Polymorphism e Indirection sono modi per ottenere protezione/disaccoppiamento.",s:"app,blue,sofia"},
{q:"Come si collega la Composizione con il pattern Creator?",a:"La composizione (intero-parte forte) offre un aiuto nell'identificazione del Creator: il composto è un buon candidato a creare le sue parti (le contiene/aggrega), come Board che crea Square o Sale che crea SalesLineItem.",s:"app,sofia"},
{q:"Come si collega Observer con il principio Modello-Vista?",a:"Observer è il rilassamento legittimo del principio Modello-Vista: l'oggetto di dominio (publisher) notifica la UI (subscriber) solo tramite un'interfaccia listener (es. PropertyListener), senza conoscere la classe concreta della vista. Mantiene basso accoppiamento e separazione degli interessi.",s:"app,sofia"},
{q:"Come si collegano Adapter, Factory e Singleton?",a:"Insieme realizzano Protected Variations rispetto a interfacce esterne variabili: l'Adapter adatta le API esterne; una Factory (Pure Fabrication) decide e crea l'adattatore giusto (data-driven); la Factory è spesso un Singleton per avere un punto di accesso globale unico.",s:"blue,sofia"},
{q:"Come si collega un code smell con il refactoring?",a:"Ogni code smell suggerisce uno o più refactoring: Long Method → Extract Method; Large Class → Extract Class/Subclass; Switch Statement → Replace Conditional with Polymorphism; Refused Bequest → Replace Inheritance with Delegation; Feature Envy → Move Method; Shotgun Surgery → Move Method/Field, Inline Class.",s:"app,blue"}
];

APS.interro=[
{t:"Processi",s:"app,blue,sofia",q:"Introducimi lo sviluppo iterativo, incrementale ed evolutivo.",model:`<ul><li>Non è un processo specifico ma un modello di organizzazione del processo.</li><li>Iterazioni <b>timeboxed</b> (2-6 settimane); ogni iterazione produce un eseguibile testato e integrato (anche parziale).</li><li><b>Incrementale</b>: il sistema cresce iterazione dopo iterazione. <b>Evolutivo</b>: il feedback di N raffina requisiti/progetto in N+1.</li><li>Vantaggi: riduzione precoce dei rischi, progresso visibile, feedback e coinvolgimento utente, gestione della complessità.</li></ul>`},
{t:"Processi",s:"app,blue,sofia",q:"Spiegami UP e le sue fasi.",model:`<ul><li>UP: processo iterativo/incrementale/evolutivo per lo sviluppo OO; pilotato da casi d'uso e rischi, incentrato sull'architettura; tutto opzionale tranne il codice.</li><li>4 fasi: <b>Ideazione</b> (visione, fattibilità), <b>Elaborazione</b> (nucleo architettura, rischi, requisiti), <b>Costruzione</b> (resto + rilascio), <b>Transizione</b> (completamento).</li><li>Attenzione: fase ≠ disciplina.</li></ul>`},
{t:"Processi",s:"app,blue,sofia",q:"Spiegami Scrum e le differenze con UP.",model:`<ul><li>Scrum: metodo agile focalizzato su organizzazione/gestione del lavoro; sprint 2-4 settimane; backlog; velocity; ruoli ScrumMaster/Team≤7/Product Owner; daily scrum.</li><li>UP è un processo più ampio e personalizzabile, pilotato da casi d'uso/rischi e incentrato sull'architettura; può essere applicato in spirito agile (UP agile).</li></ul>`},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Spiegami i casi d'uso e perché li usiamo.",model:`<ul><li>Storie scritte di un attore che usa il sistema per un obiettivo; collezione di scenari; registrano requisiti funzionali; non sono diagrammi né OO.</li><li>Perché: scoprono/descrivono i requisiti funzionali, comprensibili ai clienti, mettono in risalto gli obiettivi degli utenti, utili per guida utente e test.</li><li>Attori (primario/finale/supporto/fuori scena), formati (breve/informale/dettagliato), 3 test (capo/EBP/dimensione).</li></ul>`},
{t:"Casi d'uso",s:"app,blue,sofia",q:"Spiegami il diagramma dei casi d'uso e le sue relazioni.",model:`<ul><li>Diagramma di contesto: mostra confini del sistema, attori e casi d'uso (di solito a livello obiettivo utente).</li><li>Associazioni = canali di comunicazione (direzione = chi inizia).</li><li>Relazioni: <b>Include</b> (sempre eseguito), <b>Extend</b> (variante condizionale in un extension point), <b>Generalizzazione</b> (eredita/aggiunge/sovrascrive; anche tra attori).</li></ul>`},
{t:"Dominio",s:"app,blue,sofia",q:"Spiegami il modello di dominio e perché lo usiamo.",model:`<ul><li>Modello più importante dell'Analisi OO: classi concettuali (non software) e relazioni — un "dizionario visuale".</li><li>Diagramma delle classi senza operazioni: classi concettuali, associazioni, attributi.</li><li>Perché: comprendere il dominio e il suo vocabolario (analisi); fonte d'ispirazione per lo strato del dominio (progettazione).</li><li>NON mostra oggetti software/metodi/responsabilità.</li></ul>`},
{t:"Dominio",s:"app,blue,sofia",q:"Che differenza c'è tra composizione e aggregazione?",model:`<ul><li><b>Aggregazione</b> (rombo vuoto): tutto-parte debole; la parte può esistere indipendentemente ed essere condivisa.</li><li><b>Composizione</b> (rombo pieno): tutto-parte forte; la parte appartiene a un solo composto e dipende da esso; il composto crea/cancella le parti.</li><li>Esempi: Computer-Stampante (aggr.); Mouse-Pulsante, Board-Square (comp.).</li></ul>`},
{t:"SSD",s:"app,blue,sofia",q:"Cosa sono le operazioni e gli eventi di sistema? Spiegami l'SSD.",model:`<ul><li>SSD: mostra, per uno scenario, gli eventi I/O tra attori e sistema (scatola nera).</li><li>Evento di sistema: input esterno generato da un attore.</li><li>Operazione di sistema: trasformazione/interrogazione che il sistema esegue; l'insieme è l'interfaccia di sistema pubblica.</li><li>Nomi a livello astratto/di intenzione (verbo), parametri semplici.</li></ul>`},
{t:"Contratti",s:"app,blue,sofia",q:"Spiegami i contratti e le pre/post-condizioni.",model:`<ul><li>Descrivono i cambiamenti agli oggetti del modello di dominio causati da un'operazione di sistema.</li><li>Pre-condizioni: ipotesi sullo stato prima. Post-condizioni (la sezione più importante): osservazioni sullo stato dopo, al passato/passivo.</li><li>3 categorie di post: creazione/cancellazione istanza, modifica attributo, formazione/rottura collegamento.</li><li>Analogia del palcoscenico (foto prima/dopo).</li></ul>`},
{t:"Architettura",s:"app,blue,sofia",q:"Spiegami l'architettura logica.",model:`<ul><li>Organizzazione su larga scala delle classi software in package/strati; illustrata con diagramma dei package UML.</li><li>Architettura a strati: strato = gruppo coeso; alti usano i bassi; stretta vs rilassata.</li><li>Strati tipici: UI, Logica applicativa/Dominio, Servizi tecnici.</li><li>Vantaggi: separazione interessi, coesione, riuso, sostituibilità. Principio Modello-Vista.</li></ul>`},
{t:"GRASP",s:"app,blue,sofia",q:"Spiegami un pattern GRASP a tua scelta (es. Controller).",model:`<ul><li>Controller: primo oggetto oltre la UI che riceve e coordina un'operazione di sistema.</li><li>Tipi: facade controller (sistema/radice/sottosistema) e use-case controller (scenario di caso d'uso, una Pure Fabrication).</li><li>È delega (UI→dominio): coordina, non esegue. Attenzione ai controller gonfi (coesione bassa).</li></ul>`},
{t:"GRASP",s:"app,blue,sofia",q:"Che differenza c'è tra pattern GRASP e GoF?",model:`<ul><li>GRASP: principi di base ("consigli") per assegnare responsabilità; non mostrano schemi di classi.</li><li>GoF: design pattern con uno SCHEMA di classi per l'implementazione.</li><li>Molti GoF si analizzano in termini di GRASP (es. Adapter = Indirection+Pure Fabrication+Polymorphism).</li></ul>`},
{t:"GoF",s:"app,blue,sofia",q:"Spiegami e disegna il pattern Strategy.",model:`<ul><li>Problema: gestire algoritmi/politiche variabili ma correlati e poterli modificare.</li><li>Soluzione: ogni algoritmo in una classe separata con un'interfaccia comune (es. ISalePricingStrategy); il Context (Sale) delega all'oggetto strategia.</li><li>Il Client crea la strategia e la passa al Context (setter a runtime). Spesso creata da una Factory.</li><li>Usa Polymorphism, fornisce Protected Variations.</li><li>Vai a "UML dei GoF" per lo schema disegnato e i passi.</li></ul>`},
{t:"GoF",s:"app,blue,sofia",q:"Spiegami e disegna il pattern Observer.",model:`<ul><li>Problema: notificare più subscriber al cambio di stato di un publisher, mantenendo basso accoppiamento.</li><li>Soluzione: interfaccia listener (PropertyListener.onPropertyEvent); i subscriber si registrano dinamicamente; il publisher li avvisa.</li><li>Es: Sale (publisher) → SaleFrame1 (subscriber). Rispetta Modello-Vista, usa Polymorphism, fornisce Protected Variations.</li></ul>`},
{t:"Visibilità",s:"app,blue,sofia",q:"Spiegami i 4 modi di ottenere visibilità.",model:`<ul><li>Per attributo: B è attributo di A — permanente.</li><li>Per parametro: B passato a un metodo di A — temporanea.</li><li>Locale: B variabile locale in un metodo di A — temporanea.</li><li>Globale: B visibile globalmente — permanente (in Java via Singleton).</li><li>Trasformazioni: locale→parametro→attributo per rendere durature.</li></ul>`},
{t:"TDD",s:"app,blue,sofia",q:"Spiegami il TDD.",model:`<ul><li>Tecnica agile: prima i test, poi il codice.</li><li>Ciclo: test che fallisce → codice minimo per passarlo → refactor (verde).</li><li>Vantaggi: i test vengono scritti davvero, interfacce più chiare, verifica automatica, fiducia nel cambiare.</li><li>Tipi: unità, integrazione, sistema, accettazione. Schema unitario: Preparazione/Esecuzione/Verifica/Rilascio.</li></ul>`},
{t:"Refactoring",s:"app,blue,sofia",q:"Spiegami il refactoring (e quando si fa).",model:`<ul><li>Ristrutturare codice senza cambiarne il comportamento esterno, con piccoli passi e test continui.</li><li>Quando: Regola del Tre, aggiunta funzionalità, correzione bug (ma NON corregge i bug), code review.</li><li>Processo: test passano → trova code smell → migliora → ri-testa → ripeti.</li></ul>`},
{t:"Refactoring",s:"app,blue",q:"Spiegami come sistemare un code smell 'Long Method'.",model:`<ul><li>Sintomo: metodo con troppe righe (>10), difficile da leggere/riusare.</li><li>Refactoring: <b>Extract Method</b> (isolare sezioni in sottometodi descrittivi); se ci sono variabili temporanee, Replace Temp with Query; se condizionali, Decompose Conditional.</li></ul>`}
];
</script>

<!-- ============================ APP LOGIC ============================ -->
<script>
/* ---------- localStorage ---------- */
const LS='aps_studio_v1';
let DB={flash:{},quiz:[],seen:{}};
try{const r=localStorage.getItem(LS); if(r) DB=Object.assign(DB,JSON.parse(r));}catch(e){}
function save(){try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}}
function markView(v){DB.seen[v]=true;save();}

/* ---------- navigazione ---------- */
const NAV=[
 {grp:"Studio"},
 {id:"home",ic:"🏠",t:"Home"},
 {id:"teoria",ic:"📖",t:"Teoria"},
 {id:"bigino",ic:"⚡",t:"Bigino finale"},
 {grp:"Allenamento"},
 {id:"flash",ic:"🃏",t:"Flashcard"},
 {id:"quiz",ic:"✅",t:"Quiz"},
 {id:"interro",ic:"🎙️",t:"Interrogazione"},
 {grp:"Riferimento"},
 {id:"uml",ic:"🧩",t:"UML dei GoF"},
 {id:"mnemo",ic:"🧠",t:"Mnemonici"},
 {id:"collega",ic:"🔀",t:"Collegamenti"},
 {grp:"Stato"},
 {id:"progressi",ic:"📊",t:"Progressi"}
];
let CUR="home";
function buildNav(){
 const n=document.getElementById('toc'); n.innerHTML='';
 NAV.forEach(x=>{
   if(x.grp){const d=document.createElement('div');d.className='grp';d.textContent=x.grp;n.appendChild(d);return;}
   const b=document.createElement('button');b.id='nav-'+x.id;
   b.innerHTML='<span class="ic">'+x.ic+'</span><span>'+x.t+'</span>';
   b.onclick=()=>go(x.id); n.appendChild(b);
 });
}
function go(id){
 CUR=id; markView(id);
 document.querySelectorAll('section.view').forEach(s=>s.classList.remove('show'));

let Fdeck=[],Fidx=0,Fflip=false,Ftopic="(tutti)";
function flashTopics(){const s=new Set(APS.flash.map(f=>f.t));return ["(tutti)","(solo da rivedere)",...[...s]];}
function buildDeck(){
 if(Ftopic==="(tutti)")Fdeck=APS.flash.map((f,i)=>i);
 else if(Ftopic==="(solo da rivedere)")Fdeck=APS.flash.map((f,i)=>i).filter(i=>DB.flash[i]==='review');
 else Fdeck=APS.flash.map((f,i)=>i).filter(i=>APS.flash[i].t===Ftopic);
 if(!Fdeck.length)Fdeck=APS.flash.map((f,i)=>i);
 Fidx=0;Fflip=false;
}
function rFlash(){
 const v=document.getElementById('v-flash');
 const opts=flashTopics().map(t=>'<option'+(t===Ftopic?' selected':'')+'>'+t+'</option>').join('');
 v.innerHTML='<h2 class="vh">🃏 Flashcard</h2><p class="lead">Clicca la carta per girarla. Segna ciò che sai e ciò che è da rivedere. Lo stato è salvato.</p>'+
 '<div class="controls"><select class="sel" id="ftopic" onchange="Ftopic=this.value;buildDeck();drawFlash()">'+opts+'</select>'+
 '<button class="btn" onclick="shuffleDeck()">🔀 Mischia</button>'+
 '<button class="btn sm" onclick="resetFlash()">↺ Azzera stato</button></div>'+
 '<div class="flashwrap"><div class="flash" id="flashCard" onclick="flipFlash()"></div></div>'+
 '<p class="hint">Tocca per girare · usa i pulsanti sotto</p>'+
 '<div class="fbar"><button class="btn" onclick="navFlash(-1)">‹ Prec</button>'+
 '<div class="prog"><i id="fprog"></i></div>'+
 '<button class="btn" onclick="navFlash(1)">Succ ›</button></div>'+
 '<div class="controls" style="justify-content:center;margin-top:14px"><button class="btn ok" onclick="markFlash(\'known\')">✓ Saputa</button>'+
 '<button class="btn bad" onclick="markFlash(\'review\')">↻ Da rivedere</button></div>'+
 '<p class="cardstat" id="fstat" style="text-align:center;margin-top:10px"></p>';
 buildDeck();drawFlash();
}
function drawFlash(){
 const c=document.getElementById('flashCard'); if(!c)return;
 const idx=Fdeck[Fidx]; const f=APS.flash[idx];
 c.className='flash'+(Fflip?' flip':'');
 const st=DB.flash[idx];
 c.innerHTML='<div class="face front"><span class="lbl">Domanda</span><span class="topic">'+f.t+'</span><div class="ct">'+f.q+'</div></div>'+
 '<div class="face back"><span class="lbl">Risposta</span><span class="topic">'+f.t+'</span><div class="ct">'+f.a+'</div><span style="position:absolute;bottom:11px;left:16px">'+srcTags(f.s)+'</span></div>';
 const kn=Object.values(DB.flash).filter(x=>x==='known').length;
 const rv=Object.values(DB.flash).filter(x=>x==='review').length;
 document.getElementById('fprog').style.width=((Fidx+1)/Fdeck.length*100)+'%';
 document.getElementById('fstat').innerHTML='Carta '+(Fidx+1)+' / '+Fdeck.length+(st?' · stato: '+(st==='known'?'<span class="statkn">saputa</span>':'<span class="statrv">da rivedere</span>'):'')+' &nbsp;|&nbsp; <span class="statkn">'+kn+' sapute</span> · <span class="statrv">'+rv+' da rivedere</span>';
}
function flipFlash(){Fflip=!Fflip;drawFlash();}
function navFlash(d){Fidx=(Fidx+d+Fdeck.length)%Fdeck.length;Fflip=false;drawFlash();}
function markFlash(s){DB.flash[Fdeck[Fidx]]=s;save();if(Fidx<Fdeck.length-1)navFlash(1);else drawFlash();}
function shuffleDeck(){for(let i=Fdeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[Fdeck[i],Fdeck[j]]=[Fdeck[j],Fdeck[i]];}Fidx=0;Fflip=false;drawFlash();}

/* ---------- QUIZ ---------- */
let Qset=[],Qtopic="(tutti)",QonlyWrong=false,Qblock=10,Qstart=0,Qanswered={};
function quizTopics(){const s=new Set(APS.quiz.map(q=>q.t));return ["(tutti)",...[...s]];}
function rQuiz(){
 const v=document.getElementById('v-quiz');
 const opts=quizTopics().map(t=>'<option'+(t===Qtopic?' selected':'')+'>'+t+'</option>').join('');
 v.innerHTML='<h2 class="vh">✅ Quiz</h2><p class="lead">Crocette e vero/falso con feedback e spiegazione immediati. Le domande sbagliate vengono ricordate.</p>'+
 '<div class="controls"><select class="sel" id="qtopic" onchange="Qtopic=this.value;startQuiz()">'+opts+'</select>'+
 '<select class="sel" id="qblock" onchange="Qblock=parseInt(this.value);startQuiz()"><option value="5">Blocchi da 5</option><option value="10" selected>Blocchi da 10</option><option value="999">Tutte</option></select>'+
 '<button class="btn'+(QonlyWrong?' primary':'')+'" id="qow" onclick="QonlyWrong=!QonlyWrong;startQuiz()">⚠️ Solo sbagliate</button>'+
 '<button class="btn sm" onclick="startQuiz()">↻ Ricomincia</button></div>'+
 '<div id="quizBody"></div>';
 startQuiz();
}
function quizPool(){
 let pool=APS.quiz.map((q,i)=>i);
 if(Qtopic!=="(tutti)")pool=pool.filter(i=>APS.quiz[i].t===Qtopic);
 if(QonlyWrong)pool=pool.filter(i=>DB.quiz.some(r=>r.i===i&&!r.ok));
 return pool;
}
function startQuiz(){Qstart=0;Qanswered={};Qset=quizPool();renderQuizBlock();}
function renderQuizBlock(){
 const body=document.getElementById('quizBody'); if(!body)return;
 if(!Qset.length){body.innerHTML='<div class="summary"><p>Nessuna domanda con questi filtri. 🎉<br>(Se "Solo sbagliate" è attivo, vuol dire che non ne hai sbagliate!)</p></div>';return;}
 const block=Qset.slice(Qstart,Qstart+Qblock);
 const total=Qset.length;
 let answeredInBlock=block.filter(i=>Qanswered[i]!==undefined).length;
 let correctSoFar=Object.keys(Qanswered).filter(i=>Qanswered[i]).length;
 let html='<div class="scorebar"><span class="big">'+correctSoFar+' / '+Object.keys(Qanswered).length+'</span><span class="pill">corrette</span>'+
 '<span class="pill">Blocco '+(Math.floor(Qstart/Qblock)+1)+' di '+Math.ceil(total/Qblock)+'</span>'+
 '<span class="pill">'+total+' domande totali (filtro)</span></div>';
 block.forEach(i=>{
   const q=APS.quiz[i]; const ans=Qanswered[i];
   html+='<div class="quizq"><div class="qtop"><span class="qtext">'+q.q+'</span><span class="qn">'+(q.tp==='vf'?'V/F':'scelta')+' · '+q.t+'</span></div>';
   if(q.tp==='mc'){
     q.o.forEach((o,oi)=>{
       let cls='opt';
       if(ans!==undefined){ if(oi===q.c)cls+=' correct'; else if(oi===ans.pick)cls+=' wrong'; else cls+=' dim'; }
       html+='<button class="'+cls+'"'+(ans!==undefined?' disabled':'')+' onclick="answerQuiz('+i+','+oi+')">'+o+'</button>';
     });
   }else{
     [["Vero",true],["Falso",false]].forEach((o,oi)=>{
       let cls='opt';
       if(ans!==undefined){ if(o[1]===q.c)cls+=' correct'; else if(o[1]===ans.pickv)cls+=' wrong'; else cls+=' dim'; }
       html+='<button class="'+cls+'"'+(ans!==undefined?' disabled':'')+' onclick="answerQuizVF('+i+','+(o[1]?1:0)+')">'+o[0]+'</button>';
     });
   }
   html+='<div class="expl'+(ans!==undefined?' show':'')+'" id="expl-'+i+'">'+(ans!==undefined?(ans.ok?'<strong style="color:var(--ok)">✓ Corretto. </strong>':'<strong style="color:var(--bad)">✗ Sbagliato. </strong>'):'')+q.e+' '+srcTags(q.s)+'</div></div>';
 });
 // nav blocco
 html+='<div class="controls" style="justify-content:space-between">';
 html+=Qstart>0?'<button class="btn" onclick="Qstart-=Qblock;renderQuizBlock();window.scrollTo(0,0)">‹ Blocco prec</button>':'<span></span>';
 if(Qstart+Qblock<total) html+='<button class="btn primary" onclick="Qstart+=Qblock;renderQuizBlock();window.scrollTo(0,0)">Blocco succ ›</button>';
 else html+='<button class="btn primary" onclick="quizSummary()">📋 Riepilogo finale</button>';
 html+='</div>';
 body.innerHTML=html;
}
function recordAnswer(i,ok){
 DB.quiz=DB.quiz.filter(r=>r.i!==i); DB.quiz.push({i:i,ok:ok,t:Date.now()}); save();
}
function answerQuiz(i,pick){const q=APS.quiz[i];const ok=pick===q.c;Qanswered[i]={pick:pick,ok:ok};recordAnswer(i,ok);renderQuizBlock();}
function answerQuizVF(i,pv){const q=APS.quiz[i];const pick=pv===1;const ok=pick===q.c;Qanswered[i]={pickv:pick,ok:ok};recordAnswer(i,ok);renderQuizBlock();}
function quizSummary(){
 const body=document.getElementById('quizBody');
 const tot=Object.keys(Qanswered).length; const corr=Object.keys(Qanswered).filter(i=>Qanswered[i].ok).length;
 const pct=tot?Math.round(corr/tot*100):0;
 const wrong=Object.keys(Qanswered).filter(i=>!Qanswered[i].ok);
 let msg=pct>=80?'Ottimo! Sei pronto su questo blocco. 🎯':pct>=60?'Buono, ma rivedi le sbagliate. 📚':'Da consolidare: rivedi la teoria. 💪';
 let html='<div class="summary"><div class="pct">'+pct+'%</div><p>'+corr+' corrette su '+tot+'</p><p style="color:var(--soft)">'+msg+'</p></div>';
 if(wrong.length){
   html+='<div class="tcard"><h3>⚠️ Da rivedere ('+wrong.length+')</h3>';
   wrong.forEach(i=>{html+='<p style="margin:8px 0"><strong>'+APS.quiz[i].q+'</strong><br><span style="color:var(--soft);font-size:.9rem">'+APS.quiz[i].e+'</span></p>';});
   html+='<button class="btn primary" onclick="QonlyWrong=true;document.getElementById(\'qow\').classList.add(\'primary\');startQuiz();window.scrollTo(0,0)">Riprova solo le sbagliate</button></div>';
 }
 html+='<div class="controls"><button class="btn" onclick="startQuiz();window.scrollTo(0,0)">↻ Ricomincia</button></div>';
 body.innerHTML=html;
}
function quizTopic(t){Qtopic=t;QonlyWrong=false;go('quiz');}

  ["🗺️ Modello di Dominio","Classi concettuali (non sw), 'dizionario visuale', niente operazioni. Classe concettuale: simbolo/intensione/estensione. <b>Aggregazione</b> (rombo vuoto, parte indipendente) vs <b>Composizione</b> (rombo pieno, parte dipende dal composto). Attributi ≠ chiavi esterne. LRG = basso salto rappresentazionale.","app,blue,sofia"],
  ["📨 SSD & Contratti","SSD: eventi I/O, sistema a scatola nera, operazioni di sistema. Contratti: pre/post-condizioni; le <b>post-condizioni</b> (sezione più importante) sono osservazioni al passato/passivo: creazione/cancellazione istanza, modifica attributo, formazione/rottura collegamento. Analogia del palcoscenico.","app,blue,sofia"],
  ["🏛️ Architettura","Logica = classi sw in package/strati (diagramma dei package). A strati: stretta vs rilassata. Strati: UI / Dominio (logica applicativa) / Servizi tecnici. Principio Modello-Vista (rilassato da Observer). Tier/Layer/Partition.","app,blue,sofia"],
  ["🔗 Interazione","Statici (classi/package) vs dinamici (sequenza/comunicazione/stati/attività) in parallelo. SD = sequenza temporale (steccato); CD = grafo. Sincrono (punta piena)/asincrono (punta vuota). Frame: opt/alt/loop/break/ref/par/neg/critical.","app,blue,sofia"],
  ["🧱 Classi (DCD)","Visibilità: + - # ~. Operazione (specifica) vs metodo (implementazione). Generalizzazione: {disjoint/overlapping}, {complete/incomplete} (default overlapping,incomplete). Interfacce: lollipop (fornita)/socket (richiesta). Profilo: stereotipi+tag+vincoli.","app,blue,sofia"],
  ["⚙️ Stati","Stati, transizioni, eventi (chiamata/segnale/variazione/temporale). Azione (istantanea) vs attività (interrompibile). Pseudostati: giunzione, selezione (diamante), H/H*, finale composito (croce). Stati compositi semplici/ortogonali; flag/stati di sync.","app,blue,sofia"],
  ["🌊 Attività","'Flusso OO'. Nodi: azione/controllo/oggetto. Token game: AND in entrata, fork implicita in uscita. Controllo: iniziale, finale attività/flusso, decisione, fusione, biforcazione, ricongiunzione. Pin, partizioni (swimlane).","app,blue,sofia"],
  ["🎯 GRASP (9)","<b>Creator</b> (chi crea A), <b>Information Expert</b> (chi ha le info), <b>Low Coupling</b>, <b>Controller</b> (1° oltre la UI; facade/use-case; attenti ai gonfi), <b>High Cohesion</b> (4 livelli), <b>Pure Fabrication</b> (classe artificiale), <b>Polymorphism</b>, <b>Indirection</b>, <b>Protected Variations</b>. RDD: responsabilità di fare/conoscere.","app,blue,sofia"],
  ["🧩 GoF (7)","<b>Adapter</b> (interfacce incompatibili), <b>Factory</b> (Pure Fabrication che crea, ritorna interfacce, spesso Singleton), <b>Singleton</b> (getInstance statico, costruttore privato), <b>Strategy</b> (algoritmi intercambiabili), <b>Composite</b> (stessa interfaccia per composto/atomico), <b>Facade</b> (punto unico al sottosistema), <b>Observer</b> (publisher/subscriber, listener). Molti = specializzazioni di GRASP.","app,blue,sofia"],
  ["👁️ Visibilità & TDD & Refactoring","Visibilità: <b>attributo/parametro/locale/globale</b> (permanenti: attributo+globale). TDD: test fallisce → codice minimo → refactor; test unità/integrazione/sistema/accettazione; fixture. Refactoring: niente cambio di comportamento esterno, NON corregge bug, Regola del Tre. Code smell (5 categorie: Bloaters/OO Abusers/Change Preventers/Dispensables/Couplers).","app,blue,sofia"]
 ];
 let html='<h2 class="vh">⚡ Bigino finale</h2><p class="lead">Tutto il programma in pillole, per il ripasso last-minute. Ogni voce rimanda alla teoria estesa.</p>';
 B.forEach(b=>{html+='<div class="tcard" style="padding:14px 18px"><h3 style="font-size:1.05rem">'+b[0]+' '+srcTags(b[2])+'</h3><p style="margin:6px 0 0">'+b[1]+'</p></div>';});
 html+='<div class="footnote">Per gli schemi UML dei pattern vai a <span class="jump" onclick="go(\'uml\')">🧩 UML dei GoF</span>. Per autointerrogarti: <span class="jump" onclick="go(\'interro\')">🎙️ Interrogazione</span>.</div>';
 document.getElementById('v-bigino').innerHTML=html;
}

/* ---------- PROGRESSI ---------- */
function rProgressi(){
 const v=document.getElementById('v-progressi');
 const totF=APS.flash.length;
 const kn=Object.values(DB.flash).filter(x=>x==='known').length;
 const rv=Object.values(DB.flash).filter(x=>x==='review').length;
 const fpct=totF?Math.round(kn/totF*100):0;
 // quiz stats
 const qAnswered=DB.quiz.length, qOk=DB.quiz.filter(r=>r.ok).length;
 const qpct=qAnswered?Math.round(qOk/qAnswered*100):0;
 // per-topic flash coverage
 const topics=[...new Set(APS.flash.map(f=>f.t))];
 let bars='';
 topics.forEach(t=>{
   const idxs=APS.flash.map((f,i)=>({f,i})).filter(o=>o.f.t===t).map(o=>o.i);
   const k=idxs.filter(i=>DB.flash[i]==='known').length;
   const p=idxs.length?Math.round(k/idxs.length*100):0;
   bars+='<div class="barrow"><span class="bn">'+t+'</span><div class="bt"><i style="width:'+p+'%"></i></div><span class="bv">'+k+'/'+idxs.length+'</span></div>';
 });
 v.innerHTML='<h2 class="vh">📊 Progressi</h2><p class="lead">Stato locale del tuo studio (salvato nel browser).</p>'+
 '<div class="pgrid">'+
 '<div class="pbox"><div class="ring" style="--p:'+fpct+'"><span>'+fpct+'%</span></div><div class="lab">Flashcard sapute</div></div>'+
 '<div class="pbox"><div class="num">'+kn+'</div><div class="lab">Sapute</div></div>'+
 '<div class="pbox"><div class="num statrv" style="color:var(--warn)">'+rv+'</div><div class="lab">Da rivedere</div></div>'+
 '<div class="pbox"><div class="num">'+qpct+'%</div><div class="lab">Quiz corretti ('+qOk+'/'+qAnswered+')</div></div>'+
 '</div>'+
 '<div class="tcard"><h3>🃏 Copertura flashcard per argomento</h3>'+(bars||'<p style="color:var(--soft)">Inizia a studiare le flashcard!</p>')+'</div>'+
 '<div class="controls"><button class="btn primary" onclick="exportJSON()">⬇️ Esporta progressi (JSON)</button>'+
 '<label class="btn" style="cursor:pointer">⬆️ Importa<input type="file" accept="application/json" style="display:none" onchange="importJSON(this)"></label>'+
 '<button class="btn bad" onclick="if(confirm(\'Azzerare TUTTI i progressi?\')){DB={flash:{},quiz:[],seen:{}};save();go(\'progressi\')}">🗑️ Azzera tutto</button></div>'+
 '<div class="footnote">L\'export crea un file JSON con flashcard, punteggi quiz e sezioni viste: utile per portare i progressi su un altro dispositivo (Esporta → Importa).</div>';
}
function exportJSON(){
 const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aps-studio-progressi.json';a.click();
}
function importJSON(inp){
 const f=inp.files[0];if(!f)return;const rd=new FileReader();
 rd.onload=e=>{try{const d=JSON.parse(e.target.result);DB=Object.assign({flash:{},quiz:[],seen:{}},d);save();alert('Progressi importati!');go('progressi');}catch(err){alert('File non valido.');}};
 rd.readAsText(f);
}
